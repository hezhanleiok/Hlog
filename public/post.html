<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章阅读 - HLOG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    :root { --main-radius: 12px; }
    body { background-color: #f4f7f9; color: #1e293b; }
    .nav-link { font-size: 1.15rem; font-weight: 800; transition: color 0.3s; color: #475569; }
    .nav-link:hover, .nav-link.active { color: #6366f1; }
    .dropdown { position: relative; padding-bottom: 10px; margin-bottom: -10px; }
    .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; min-width: 180px; background: white; border-radius: 10px; border: 1px solid #e5e7eb; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 100; padding: 8px 0; }
    .dropdown:hover .dropdown-menu { display: block; }
    
    .ql-editor { font-size: 1.05rem; line-height: 1.8; color: #334155; }
    .ql-editor img { max-width: 100%; border-radius: 8px; margin: 1.5rem 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .ql-editor h2 { font-size: 1.5rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; }
    .ql-editor h3 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .ql-editor blockquote { border-left: 4px solid #6366f1; background-color: #f8fafc; padding: 1rem; color: #475569; font-style: italic; margin: 1.5rem 0; border-radius: 0 8px 8px 0; }
    iframe.ql-video { width: 100%; aspect-ratio: 16/9; border-radius: 8px; margin: 1.5rem 0; }
    .aside-title { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 800; color: #1e293b; margin-bottom: 1.25rem; }
    .aside-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
  </style>
</head>
<body class="antialiased font-sans">
  <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      <div class="flex items-center gap-10"> 
        <a href="/" class="flex items-center gap-2 group">
           <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-2xl shadow-lg group-hover:rotate-6 transition-transform">H</div>
           <span class="text-3xl font-black text-slate-800 tracking-tighter">HLOG</span>
        </a>
        <nav class="hidden md:flex items-center gap-10"> 
          <a href="/" class="nav-link">首页</a>
          <div class="dropdown">
            <a href="#" class="nav-link active flex items-center gap-1">文章 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg></a>
            <div id="navCatList" class="dropdown-menu">
               <div class="px-4 py-2 text-xs text-slate-400 italic">同步分类中...</div>
            </div>
          </div>
          <a href="/about.html" class="nav-link">关于</a>
          <a href="/privacy.html" class="nav-link">隐私</a>
        </nav>
      </div>

      <div class="flex items-center gap-4">
        <form id="searchForm" class="hidden sm:flex items-center bg-slate-100 rounded-full px-5 py-2 focus-within:bg-white border focus-within:border-indigo-300 transition-all">
          <input id="searchInput" type="text" placeholder="搜索站内..." class="bg-transparent text-sm outline-none w-32 focus:w-48 transition-all" />
          <button type="submit" class="text-slate-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
        </form>
        <div id="authLinks" class="flex items-center gap-3"></div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row gap-8">
      <div class="flex-1 min-w-0">
        <article class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <div class="p-8 md:p-12">
            <h1 id="postTitle" class="text-3xl md:text-4xl font-black text-slate-900 leading-tight mb-6">加载中...</h1>
            <div id="postMeta" class="flex flex-wrap items-center gap-6 text-sm font-bold text-slate-400 mb-8 pb-8 border-b border-slate-100 uppercase tracking-widest">
            </div>
            
            <div id="postCover" class="w-full aspect-video rounded-xl overflow-hidden mb-10 hidden bg-slate-50">
              <img src="" class="w-full h-full object-cover" />
            </div>

            <div id="postContent" class="ql-editor p-0">
               <div class="flex justify-center items-center py-20 text-indigo-500 font-bold">
                 <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                 正在获取文章内容...
               </div>
            </div>
            
            <div id="postTags" class="mt-10 flex flex-wrap gap-2 font-bold"></div>
          </div>
        </article>

        <div id="hiddenContentWrapper" class="mt-8 bg-amber-50 border border-amber-200 rounded-2xl p-6 hidden shadow-sm">
          <h3 class="text-sm font-black text-amber-600 mb-2 flex items-center gap-2"><span>🔑</span> 专属登录内容</h3>
          <div id="hiddenContent" class="text-slate-700 text-sm break-all font-medium"></div>
        </div>

        <div class="mt-12 bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
          <h3 class="text-xl font-black text-slate-800 mb-8 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-indigo-600 rounded-full"></span> 参与互动探讨
          </h3>
          <div id="commentForm" class="mb-10">
            <div class="flex flex-col md:flex-row gap-4 mb-4">
              <input type="text" id="commentName" placeholder="您的昵称 (必填)" class="flex-1 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-indigo-500 transition" required />
              <input type="email" id="commentEmail" placeholder="您的邮箱 (必填，不会被公开)" class="flex-1 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-indigo-500 transition" required />
            </div>
            <textarea id="commentContent" rows="3" placeholder="写下你的想法..." class="w-full border border-slate-200 rounded-xl p-4 mb-4 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition"></textarea>
            <button id="submitCommentBtn" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition">发表评论</button>
          </div>
          <div id="commentsList" class="space-y-6"></div>
        </div>
      </div>

      <aside class="w-full md:w-80 shrink-0 space-y-8">
        <div class="bg-white rounded-2xl p-8 text-center border border-slate-200 shadow-sm relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-indigo-500 to-purple-600 opacity-10"></div>
          <img src="https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png" class="w-20 h-20 rounded-2xl object-cover mx-auto mb-4 border-4 border-white shadow-md relative z-10" />
          <h3 class="text-lg font-black text-slate-900">XIAOHE</h3>
          <p class="text-xs text-slate-400 mt-2 font-bold">一个互联网爱好分享者！</p>
          <div class="grid grid-cols-2 border-t border-slate-50 mt-8 pt-6">
            <div><div id="stat_posts" class="text-base font-black text-slate-800">0</div><div class="text-[10px] text-slate-400 uppercase font-bold">文章</div></div>
            <div><div id="stat_tags" class="text-base font-black text-slate-800">0</div><div class="text-[10px] text-slate-400 uppercase font-bold">标签</div></div>
          </div>
        </div>
        
        <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
          <h3 class="aside-title"><div class="aside-icon bg-blue-100 text-blue-600">📊</div> 运行统计</h3>
          <div class="space-y-4 pt-2">
            <div class="flex justify-between items-center text-sm">
              <span class="text-slate-400 font-bold">今日访客</span>
              <span id="statTodayViews" class="font-black text-slate-700">0</span>
            </div>
            <div class="flex justify-between items-center text-sm">
              <span class="text-slate-400 font-bold">累计访问</span>
              <span id="statTotalViews" class="font-black text-slate-700">0</span>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
          <h3 class="aside-title"><div class="aside-icon bg-orange-100 text-orange-600">🔥</div> 热门推荐</h3>
          <div id="hotList" class="space-y-4"></div>
        </div>
      </aside>
    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 mt-12 py-8 text-center">
    <p class="text-sm text-slate-400 font-bold">© 2026 HLOG · 极致分享 · Cloudflare 驱动</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    const authLinks = document.getElementById("authLinks");
    if (auth?.token) {
      authLinks.innerHTML = `<a href="/admin.html" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-black shadow-lg">管理后台</a>`;
    } else {
      authLinks.innerHTML = `<a href="/login.html" class="text-sm font-black text-slate-600 hover:text-indigo-600">登录</a><a href="/register.html" class="px-5 py-2 bg-slate-800 text-white rounded-xl text-sm font-black shadow-lg">注册</a>`;
    }

    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (auth?.token) headers.Authorization = `Bearer ${auth.token}`;
      return (await fetch(path, { ...options, headers })).json().catch(() => ({}));
    }

    function getCover(p) {
      if(p.cover_url) return p.cover_url;
      const m = (p.content||"").match(/<img[^>]+src="([^">]+)"/);
      return m ? m[1] : "https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png";
    }

    function escapeHtml(s) { return String(s || "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m])); }

    async function load() {
      // 一次性获取所有需要的数据以提高速度
      const [catData, stats, siteStats, tagsData, hotData] = await Promise.all([
        api("/api/category/list"),
        api("/api/stats"),
        api("/api/site/stats"),
        api("/api/tag/list"),
        api("/api/post/list?sort=views&limit=5")
      ]);

      // 菜单
      const cats = catData.categories || [];
      document.getElementById("navCatList").innerHTML = cats.map(c => 
        `<a href="/?cat=${c.id}" class="block px-5 py-2.5 hover:bg-indigo-50 font-bold text-slate-600 transition-colors">${c.name}</a>`).join("");

      // 侧边栏统计
      document.getElementById("stat_posts").textContent = siteStats.post_count || 0;
      document.getElementById("stat_tags").textContent = (tagsData.tags || []).length;
      document.getElementById("statTodayViews").textContent = stats.today_views || 0;
      document.getElementById("statTotalViews").textContent = siteStats.total_views || 0;

      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get("post");
      if (!postId) { document.getElementById("postContent").innerHTML = "<div class='text-center py-10 font-bold'>缺少文章参数</div>"; return; }

      const data = await api(`/api/post/view?id=${postId}`);
      if (!data || !data.post) {
         document.title = "文章加载失败 - HLOG";
         document.getElementById("postTitle").textContent = "文章加载失败";
         document.getElementById("postContent").innerHTML = `<div class='text-center text-red-500 py-10 font-bold'>无法获取文章数据：${data?.error || '数据库字段不匹配或文章已被删除'}</div>`;
         return;
      }
      
      const post = data.post;
      document.title = `${post.title} - HLOG`;
      document.getElementById("postTitle").textContent = post.title;
      document.getElementById("postMeta").innerHTML = `
        <span>时间: ${new Date(post.created_at).toLocaleString()}</span>
        <span>分类: ${post.category_name || '未分类'}</span>
        <span>阅读: ${post.views}</span>
      `;
      
      if (post.cover_url) {
        document.getElementById("postCover").classList.remove("hidden");
        document.querySelector("#postCover img").src = post.cover_url;
      }
      
      document.getElementById("postContent").innerHTML = post.content || "<p>暂无内容</p>";
      document.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
      document.getElementById("postTags").innerHTML = (post.tags||[]).map(t=>`<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[10px] uppercase">${escapeHtml(t)}</span>`).join("");

      if (post.hidden_content) {
        document.getElementById("hiddenContentWrapper").classList.remove("hidden");
        document.getElementById("hiddenContent").innerHTML = escapeHtml(post.hidden_content).replace(/\n/g, '<br>');
      } else if (post.has_hidden_content) {
        document.getElementById("hiddenContentWrapper").classList.remove("hidden");
        document.getElementById("hiddenContent").innerHTML = `<a href="/login.html" class="text-indigo-600 underline font-bold">登录后查看专属内容</a>`;
      }

      // 侧边栏热门，同样改为相对路径
      document.getElementById("hotList").innerHTML = (hotData.posts || []).map(p => `
        <a href="./post.html?post=${p.id}" class="flex gap-3 group bg-slate-50 p-2 rounded-xl hover:bg-indigo-50 transition-colors border border-slate-100">
          <img src="${getCover(p)}" class="w-16 h-12 rounded-lg object-cover shrink-0" />
          <div class="min-w-0 flex flex-col justify-center">
            <h4 class="text-xs font-black text-slate-700 line-clamp-2 group-hover:text-indigo-600 transition leading-snug">${escapeHtml(p.title)}</h4>
          </div>
        </a>`).join("");

      loadComments(postId);
    }

    async function loadComments(postId) {
      const data = await api(`/api/comment/list?post_id=${postId}`);
      document.getElementById("commentsList").innerHTML = (data.comments || []).map(c => `
        <div class="border-b border-slate-100 pb-4">
          <div class="flex items-center gap-3 mb-2">
            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(c.name)}&background=random&color=fff" class="w-8 h-8 rounded-full shadow-sm shrink-0">
            <div>
                <span class="font-bold text-sm text-indigo-600">${escapeHtml(c.name)}</span>
                <span class="text-[10px] text-slate-400 font-bold ml-2">${new Date(c.created_at).toLocaleString()}</span>
            </div>
          </div>
          <div class="text-sm text-slate-600 pl-11 font-medium">${escapeHtml(c.content)}</div>
          ${c.reply ? `<div class="mt-3 ml-11 bg-slate-50 p-3 rounded-lg border border-slate-100"><div class="text-xs font-black text-indigo-600 mb-1">作者回复:</div><div class="text-xs text-slate-600 font-medium">${escapeHtml(c.reply)}</div></div>` : ''}
        </div>`).join("") || '<div class="text-sm text-slate-400 italic">暂无评论，快来抢沙发！</div>';
    }

    // 游客直接评论逻辑
    document.getElementById("submitCommentBtn").onclick = async () => {
      const name = document.getElementById("commentName").value.trim();
      const email = document.getElementById("commentEmail").value.trim();
      const content = document.getElementById("commentContent").value.trim();
      
      if (!name || !email || !content) return alert("请填写完整您的昵称、邮箱和评论内容");
      
      const btn = document.getElementById("submitCommentBtn"); btn.disabled = true; btn.textContent = "提交中...";
      const postId = new URLSearchParams(window.location.search).get("post");
      try {
        await api("/api/comment/add", { 
          method: "POST", 
          body: JSON.stringify({ post_id: Number(postId), name, email, content }) 
        });
        alert("评论提交成功！");
        document.getElementById("commentContent").value = "";
        loadComments(postId);
      } catch(e) { alert("评论失败"); } finally { btn.disabled = false; btn.textContent = "发表评论"; }
    };

    document.getElementById("searchForm").addEventListener("submit", (e) => {
      e.preventDefault(); const q = document.getElementById("searchInput").value.trim();
      if(q) location.href = `/?q=${encodeURIComponent(q)}`;
    });

    load();
  </script>
</body>
</html>
