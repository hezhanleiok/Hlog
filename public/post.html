<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 文章详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hlog-prose { font-size: 16px; line-height: 1.8; color: #334155; }
    .hlog-prose pre { background: #1e293b; color: #f8fafc; padding: 16px; border-radius: 12px; overflow: auto; margin: 1em 0; }
    .hlog-prose code { font-family: ui-monospace, SFMono-Regular, Monaco, monospace; }
    .hlog-prose blockquote { border-left: 4px solid #38bdf8; padding-left: 16px; color: #475569; background: #f0f9ff; border-radius: 8px; padding-top: 10px; padding-bottom: 10px; margin: 1em 0; }
    .hlog-prose img { border-radius: 12px; max-width: 100%; height: auto; margin: 1.5em 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .hlog-prose a { color: #0284c7; text-decoration: underline; }
    .hlog-prose iframe { width: 100%; height: 450px; border-radius: 12px; margin: 1em 0; }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-800">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-2xl font-black text-sky-600 tracking-tight">HLOG</a>
      <nav class="flex items-center gap-3 text-sm font-semibold">
        <a href="/" class="px-3 py-2 text-slate-600 hover:text-sky-600 transition">首 页</a>
        <a href="/login.html" id="loginLink" class="px-3 py-2 text-slate-600 hover:text-sky-600 transition">登 录</a>
        <a href="/register.html" id="registerLink" class="px-3 py-2 text-slate-600 hover:text-sky-600 transition">注 册</a>
        <a href="/admin.html" id="adminLink" class="px-4 py-2 rounded-full bg-slate-900 text-white hidden hover:bg-slate-800">管理后台</a>
        <button id="logoutBtn" class="px-4 py-2 rounded-full bg-slate-200 text-slate-700 hidden hover:bg-slate-300">退出账号</button>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <article id="postArticle" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div id="postCoverWrap" class="hidden">
        <img id="postCover" class="w-full h-[400px] object-cover" alt="封面" />
      </div>

      <div class="p-8 md:p-12">
        <div id="postTags" class="flex flex-wrap gap-2 mb-4"></div>
        <h1 id="postTitle" class="text-3xl md:text-5xl font-black text-slate-900 leading-tight">加载中...</h1>
        <div id="postMeta" class="mt-4 text-sm text-slate-500 flex flex-wrap gap-x-6 gap-y-2 font-medium"></div>
        
        <div id="postContent" class="hlog-prose mt-8"></div>

        <div id="hiddenContentWrap" class="mt-12"></div>
      </div>
    </article>

    <section class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <h2 class="text-2xl font-black text-slate-800 border-l-4 border-sky-500 pl-3">读者评论</h2>

      <div id="commentClosedNotice" class="hidden mt-6 text-sm font-bold text-amber-700 bg-amber-50 border border-amber-200 rounded-xl p-4">
        🔒 当前文章评论功能已被作者关闭。
      </div>

      <form id="commentForm" class="mt-8 space-y-5 bg-slate-50 p-6 rounded-xl border border-slate-100">
        <div class="text-sm font-bold text-slate-600 flex items-center gap-2">
          <svg class="w-5 h-5 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
          参与讨论 (无需注册，游客可直接评论)
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <input id="commentName" class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition" placeholder="您的昵称 (必填)" required />
          </div>
          <div>
            <input id="commentEmail" type="email" class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition" placeholder="您的邮箱 (必填，用于接收回复)" required />
          </div>
        </div>
        <div>
          <textarea id="commentContent" rows="4" required class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition resize-y" placeholder="友善的评论是交流的起点..."></textarea>
        </div>
        <div class="flex justify-end">
          <button class="px-8 py-3 rounded-lg bg-sky-600 text-white font-bold hover:bg-sky-700 transition shadow-md hover:shadow-lg">发布评论</button>
        </div>
      </form>

      <div id="commentList" class="mt-10 space-y-6"></div>
    </section>
  </main>

  <script>
    // 基础配置与之前的 JS 类似
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (auth && auth.token) {
      document.getElementById("loginLink").classList.add("hidden");
      document.getElementById("registerLink").classList.add("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
      if (auth.role === "admin") document.getElementById("adminLink").classList.remove("hidden");
    }

    document.getElementById("logoutBtn")?.addEventListener("click", () => {
      localStorage.removeItem("hlog_auth");
      location.reload();
    });

    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (auth?.token) headers.Authorization = `Bearer ${auth.token}`;
      const res = await fetch(path, { ...options, headers });
      return await res.json().catch(() => ({}));
    }

    const params = new URLSearchParams(location.search);
    const postId = Number(params.get("post"));
    if (!postId) { alert("文章不存在"); location.href = "/"; }

    const escapeHtml = s => String(s ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

    // 隐藏内容渲染逻辑：判断登录状态
    function renderHiddenContent(hiddenContent) {
      const wrap = document.getElementById("hiddenContentWrap");
      if (!hiddenContent) return;

      if (auth && auth.token) {
        wrap.innerHTML = `
          <div class="bg-emerald-50 border-l-4 border-emerald-500 p-6 rounded-r-xl">
            <div class="text-emerald-700 font-bold mb-3 flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg>
              隐藏内容（已为您解锁）
            </div>
            <div class="hlog-prose text-emerald-900">${hiddenContent}</div>
          </div>
        `;
      } else {
        wrap.innerHTML = `
          <div class="bg-slate-100 border border-slate-200 p-8 rounded-xl text-center shadow-inner">
            <svg class="w-12 h-12 text-slate-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <h3 class="text-xl font-bold text-slate-700 mb-2">部分内容被隐藏</h3>
            <p class="text-slate-500 mb-6">本文包含加密内容（如网盘链接、下载附件等），登录账号后即可免费查看。</p>
            <div class="flex justify-center gap-4">
              <a href="/login.html" class="bg-sky-600 text-white font-bold px-6 py-2 rounded-lg hover:bg-sky-700 transition shadow-md">立即登录</a>
              <a href="/register.html" class="bg-white text-slate-700 border border-slate-300 font-bold px-6 py-2 rounded-lg hover:bg-slate-50 transition">免费注册</a>
            </div>
          </div>
        `;
      }
    }

    async function loadPost() {
      await api(`/api/post/view?post_id=${postId}`);
      const data = await api(`/api/post/list?id=${postId}`);
      if(!data || !data.post) return;
      
      const post = data.post;
      document.getElementById("postTitle").textContent = post.title;
      document.title = `${post.title} - HLOG`;
      document.getElementById("postMeta").innerHTML = `
        <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> ${new Date(post.created_at).toLocaleDateString()}</span>
        <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 5 8.268 7.943 9.542 12-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg> ${post.views || 0} 次阅读</span>
      `;

      if (post.cover_url) {
        document.getElementById("postCoverWrap").classList.remove("hidden");
        document.getElementById("postCover").src = post.cover_url;
      }

      document.getElementById("postContent").innerHTML = post.content || "";
      renderHiddenContent(post.hidden_content);

      if (Number(post.allow_comments ?? 1) === 0) {
        document.getElementById("commentClosedNotice").classList.remove("hidden");
        document.getElementById("commentForm").classList.add("hidden");
      }

      loadComments();
    }

    async function loadComments() {
      const { comments } = await api(`/api/comment/list?post_id=${postId}`);
      const list = document.getElementById("commentList");
      list.innerHTML = (comments && comments.length)
        ? comments.map(c => `
            <div class="flex gap-4 p-4 hover:bg-slate-50 rounded-xl transition">
              <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${c.author_email || c.author_name}" class="w-12 h-12 rounded-full bg-slate-200 shrink-0" alt="avatar" />
              <div class="flex-1">
                <div class="flex items-center justify-between">
                  <span class="font-bold text-slate-800">${escapeHtml(c.author_name || "热心网友")}</span>
                  <span class="text-xs text-slate-400">${new Date(c.created_at).toLocaleString()}</span>
                </div>
                <div class="mt-2 text-slate-600 whitespace-pre-wrap">${escapeHtml(c.content)}</div>
              </div>
            </div>
          `).join("")
        : '<div class="text-center py-8 text-slate-400 font-bold">暂时还没有人评论，快来抢占沙发吧！</div>';
    }

    document.getElementById("commentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await api("/api/comment/add", {
          method: "POST",
          body: JSON.stringify({
            post_id: postId,
            author_name: document.getElementById("commentName").value.trim(),
            author_email: document.getElementById("commentEmail").value.trim(),
            content: document.getElementById("commentContent").value.trim()
          })
        });
        document.getElementById("commentContent").value = "";
        alert("评论发布成功！管理员审核通过后将会展示。");
        loadComments();
      } catch (err) { alert(err.message); }
    });

    loadPost();
  </script>
</body>
</html>
