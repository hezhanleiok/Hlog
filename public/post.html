<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 文章详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hlog-prose { font-size: 16px; line-height: 1.8; color: #334155; }
    .hlog-prose pre { background: #1e293b; color: #f8fafc; padding: 16px; border-radius: 12px; overflow: auto; margin: 1em 0; }
    .hlog-prose img { border-radius: 12px; max-width: 100%; margin: 1.5em 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .hlog-prose a { color: #0284c7; text-decoration: underline; }
    .hlog-prose iframe { width: 100%; height: 450px; border-radius: 12px; margin: 1em 0; }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-800">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-2xl font-black text-sky-600 tracking-tight">HLOG</a>
      <nav class="flex items-center gap-3 text-sm font-semibold">
        <a href="/" class="px-3 py-2 text-slate-600 hover:text-sky-600">首 页</a>
        <a href="/login.html" id="loginLink" class="px-3 py-2 text-slate-600 hover:text-sky-600">登 录</a>
        <a href="/register.html" id="registerLink" class="px-3 py-2 text-slate-600 hover:text-sky-600">注 册</a>
        <a href="/admin.html" id="adminLink" class="px-4 py-2 rounded-full bg-slate-900 text-white hidden">管理后台</a>
        <button id="logoutBtn" class="px-4 py-2 rounded-full bg-slate-200 text-slate-700 hidden">退出账号</button>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <article class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div id="postCoverWrap" class="hidden"><img id="postCover" class="w-full h-[400px] object-cover" alt="封面" /></div>
      <div class="p-8 md:p-12">
        <div id="postTags" class="flex flex-wrap gap-2 mb-4"></div>
        <h1 id="postTitle" class="text-3xl md:text-5xl font-black text-slate-900 leading-tight">加载中...</h1>
        <div id="postMeta" class="mt-4 text-sm text-slate-500 font-medium"></div>
        <div id="postContent" class="hlog-prose mt-8"></div>
        <div id="hiddenContentWrap" class="mt-12"></div>
      </div>
    </article>

    <section class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <h2 class="text-2xl font-black text-slate-800 border-l-4 border-sky-500 pl-3">读者评论</h2>
      <div id="commentClosedNotice" class="hidden mt-6 text-sm font-bold text-amber-700 bg-amber-50 border border-amber-200 p-4 rounded-xl">🔒 当前文章评论功能已被关闭。</div>
      
      <form id="commentForm" class="mt-8 space-y-5 bg-slate-50 p-6 rounded-xl border border-slate-100">
        <div class="text-sm font-bold text-slate-600">参与讨论 (免注册，游客输入邮箱与昵称即可评论)</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="commentName" class="border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-sky-500" placeholder="您的昵称 (必填)" required />
          <input id="commentEmail" type="email" class="border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-sky-500" placeholder="您的邮箱 (必填)" required />
        </div>
        <textarea id="commentContent" rows="4" required class="w-full border border-slate-300 rounded-lg px-4 py-3 outline-none focus:border-sky-500" placeholder="写点什么..."></textarea>
        <div class="flex justify-end"><button class="px-8 py-3 rounded-lg bg-sky-600 text-white font-bold hover:bg-sky-700">发布评论</button></div>
      </form>
      <div id="commentList" class="mt-10 space-y-6"></div>
    </section>
  </main>

  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (auth?.token) {
      document.getElementById("loginLink").classList.add("hidden");
      document.getElementById("registerLink").classList.add("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
      if (auth.role === "admin") document.getElementById("adminLink").classList.remove("hidden");
    }
    document.getElementById("logoutBtn")?.addEventListener("click", () => { localStorage.removeItem("hlog_auth"); location.reload(); });
    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (auth?.token) headers.Authorization = `Bearer ${auth.token}`;
      return await (await fetch(path, { ...options, headers })).json().catch(() => ({}));
    }
    const postId = Number(new URLSearchParams(location.search).get("post"));
    if (!postId) location.href = "/";
    const escapeHtml = s => String(s ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

    function renderHiddenContent(hidden) {
      const wrap = document.getElementById("hiddenContentWrap");
      if (!hidden) return;
      if (auth?.token) {
        wrap.innerHTML = `<div class="bg-emerald-50 border-l-4 border-emerald-500 p-6 rounded-r-xl"><div class="text-emerald-700 font-bold mb-3">隐藏内容（已为您解锁）</div><div class="hlog-prose text-emerald-900">${hidden}</div></div>`;
      } else {
        wrap.innerHTML = `<div class="bg-slate-100 border border-slate-200 p-8 rounded-xl text-center"><h3 class="text-xl font-bold text-slate-700 mb-2">部分内容被隐藏</h3><p class="text-slate-500 mb-6">本文包含加密内容，登录账号后即可免费查看。</p><a href="/login.html" class="bg-sky-600 text-white px-6 py-2 rounded-lg font-bold">立即登录</a></div>`;
      }
    }

    async function loadPost() {
      await api(`/api/post/view?post_id=${postId}`);
      const { post } = await api(`/api/post/list?id=${postId}`);
      if(!post) return;
      document.getElementById("postTitle").textContent = post.title;
      document.title = `${post.title} - HLOG`;
      document.getElementById("postMeta").innerHTML = `${new Date(post.created_at).toLocaleDateString()} · ${post.views || 0} 次阅读`;
      if (post.cover_url) { document.getElementById("postCoverWrap").classList.remove("hidden"); document.getElementById("postCover").src = post.cover_url; }
      document.getElementById("postContent").innerHTML = post.content || "";
      renderHiddenContent(post.hidden_content);
      if (Number(post.allow_comments ?? 1) === 0) { document.getElementById("commentClosedNotice").classList.remove("hidden"); document.getElementById("commentForm").classList.add("hidden"); }
      loadComments();
    }

    async function loadComments() {
      const { comments } = await api(`/api/comment/list?post_id=${postId}`);
      document.getElementById("commentList").innerHTML = (comments && comments.length)
        ? comments.map(c => `<div class="flex gap-4 p-4 hover:bg-slate-50 rounded-xl"><img src="https://api.dicebear.com/7.x/identicon/svg?seed=${c.author_email || c.author_name}" class="w-10 h-10 rounded-full bg-slate-200 shrink-0" /><div class="flex-1"><div class="flex justify-between"><span class="font-bold">${escapeHtml(c.author_name || "网友")}</span><span class="text-xs text-slate-400">${new Date(c.created_at).toLocaleString()}</span></div><div class="mt-2 text-slate-600">${escapeHtml(c.content)}</div></div></div>`).join("")
        : '<div class="text-center py-8 text-slate-400 font-bold">暂无评论</div>';
    }

    document.getElementById("commentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await api("/api/comment/add", { method: "POST", body: JSON.stringify({ post_id: postId, author_name: document.getElementById("commentName").value.trim(), author_email: document.getElementById("commentEmail").value.trim(), content: document.getElementById("commentContent").value.trim() }) });
        document.getElementById("commentContent").value = "";
        alert("评论发布成功！管理员审核后展示。");
        loadComments();
      } catch (err) { alert("评论失败"); }
    });
    loadPost();
  </script>
</body>
</html>
