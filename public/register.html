<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm p-6">
    <h1 class="text-2xl font-bold mb-1">创建 HLOG 账号</h1>
    <p class="text-sm text-slate-500 mb-6">注册后即可发表评论，管理员可发布文章。</p>
    <form id="registerForm" class="space-y-4">
      <div>
        <label class="text-sm text-slate-600">用户名</label>
        <input id="username" required minlength="3" class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-sky-300" />
      </div>
      <div>
        <label class="text-sm text-slate-600">显示昵称</label>
        <input id="displayName" required class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-sky-300" />
      </div>
      <div>
        <label class="text-sm text-slate-600">密码</label>
        <input id="password" type="password" required minlength="6" class="mt-1 w-full border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-sky-300" />
      </div>
      <button class="w-full bg-sky-600 text-white rounded-lg py-2 hover:bg-sky-700">注册</button>
    </form>
    <p class="text-sm text-slate-500 mt-4">已有账号？<a href="/login.html" class="text-sky-600">去登录</a></p>
    <a href="/" class="inline-block mt-4 text-sm text-slate-600 hover:text-slate-900">返回首页</a>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        username: document.getElementById("username").value.trim(),
        display_name: document.getElementById("displayName").value.trim(),
        password: document.getElementById("password").value
      };
      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "注册失败");
        alert("注册成功，请登录");
        location.href = "/login.html";
      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
