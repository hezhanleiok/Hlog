<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - HLOG</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5] flex items-center justify-center min-h-screen py-10">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-black text-center text-slate-800 mb-2">加入 HLOG</h2>
    <p class="text-sm text-center text-slate-500 mb-8 font-bold">注册后即可发表评论，管理员可发布文章。</p>
    
    <form id="registerForm" class="space-y-4">
      <input type="text" id="username" placeholder="用户名 (登录账号)" required minlength="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition" />
      
      <input type="text" id="displayName" placeholder="显示昵称" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition" />
      
      <input type="email" id="email" placeholder="邮箱" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition" />
      <input type="password" id="password" placeholder="密码" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition" />
      
      <div class="flex gap-2">
        <input type="text" id="emailCode" placeholder="邮箱验证码" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition" />
        <button type="button" id="sendCodeBtn" class="whitespace-nowrap px-6 py-3 bg-slate-50 text-indigo-600 font-bold rounded-xl border border-slate-200 hover:bg-slate-100 transition">发送验证码</button>
      </div>

      <input type="text" id="invitationCode" placeholder="邀请码 (如无则不填)" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500 transition" />
      
      <button type="submit" id="submitBtn" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition mt-4">立即注册</button>
    </form>
    
    <div class="mt-6 text-center text-sm text-slate-500">
      已有账号？ <a href="/login.html" class="text-indigo-600 font-bold hover:underline">去登录</a>
    </div>
  </div>

  <script>
    // 原汁原味恢复你的验证码发送逻辑
    let countdownTimer = null;
    let countdownSeconds = 60;

    document.getElementById('sendCodeBtn').addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) return alert("请先填写邮箱地址");
      
      const sendCodeBtn = document.getElementById("sendCodeBtn");
      sendCodeBtn.disabled = true;
      sendCodeBtn.textContent = "发送中...";

      try {
        const res = await fetch("/api/auth/send-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "发送验证码失败");
        
        alert("验证码已发送至邮箱，请查收");
        
        // 倒计时 UI
        countdownTimer = setInterval(() => {
          countdownSeconds--;
          sendCodeBtn.textContent = `${countdownSeconds}s 后重试`;
          if (countdownSeconds <= 0) {
            clearInterval(countdownTimer);
            sendCodeBtn.disabled = false;
            sendCodeBtn.textContent = "获取验证码";
            countdownSeconds = 60;
          }
        }, 1000);
      } catch (err) {
        alert(err.message);
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = "获取验证码";
      }
    });

    // 完美匹配你后端的字段要求
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const payload = {
        username: document.getElementById("username").value.trim(),
        display_name: document.getElementById("displayName").value.trim(),
        password: document.getElementById("password").value,
        email: document.getElementById("email").value.trim(),
        email_code: document.getElementById("emailCode").value.trim(),
        invitation_code: document.getElementById("invitationCode").value.trim() || null
      };

      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.textContent = "注册中...";

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "注册失败");
        
        alert("注册成功，请登录！");
        location.href = "/login.html";
      } catch (err) {
        alert(err.message);
        btn.disabled = false; btn.textContent = "立即注册";
      }
    });
  </script>
</body>
</html>
