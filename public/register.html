<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - HLOG</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5] flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h2 class="text-2xl font-black text-center text-slate-800 mb-8">加入 HLOG</h2>
    <form id="regForm" class="space-y-4">
      <input type="text" id="username" placeholder="用户名" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500" />
      <input type="password" id="password" placeholder="密码" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500" />
      <input type="text" id="inviteCode" placeholder="邀请码 (必填)" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500" />
      <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">注册</button>
    </form>
    <div class="mt-6 text-center text-sm text-slate-500">
      已有账号？ <a href="/login.html" class="text-indigo-600 font-bold">去登录</a>
    </div>
  </div>
  <script>
    document.getElementById('regForm').onsubmit = async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const c = document.getElementById('inviteCode').value;
      try {
        const res = await fetch('/api/register', { method: 'POST', body: JSON.stringify({ username: u, password: p, inviteCode: c }) });
        const data = await res.json();
        if(res.ok) { alert('注册成功！'); location.href = '/login.html'; }
        else alert('注册失败: ' + data.error);
      } catch (err) { alert('网络错误'); }
    };
  </script>
</body>
</html>
