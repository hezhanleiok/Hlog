            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">

                <div class="rounded-xl bg-slate-50 p-3"><div class="text-xs text-slate-500">总注册用户</div><div id="statTotalUsers" class="text-lg font-bold text-slate-900">—</div></div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (auth?.token) {
      document.getElementById("loginLink").classList.add("hidden");
      document.getElementById("registerLink").classList.add("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
      if (auth.role === "admin") document.getElementById("adminLink").classList.remove("hidden");
    }
    document.getElementById("logoutBtn")?.addEventListener("click", () => { localStorage.removeItem("hlog_auth"); location.reload(); });

    async function api(path, options = {}) {
      const headers = options.headers || {};
      if (auth?.token) headers.Authorization = `Bearer ${auth.token}`;
      const res = await fetch(path, { ...options, headers });
      return await res.json().catch(() => ({}));
    }

    // 🌟 核心修复：自动提取文章中的图片作为封面
    function getPostCover(post) {
      if (post.cover_url && post.cover_url.trim() !== "") return post.cover_url;
      // 提取正文中第一个 <img> 标签的 src
      const match = (post.content || "").match(/<img[^>]+src="([^">]+)"/);
      return match ? match[1] : `https://picsum.photos/seed/${post.id}/800/450`;
    }

    function escapeHtml(s) { return String(s || "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m])); }

    let homeSwiper = null;
    function renderHeroSwiper(items) {
      if (homeSwiper) homeSwiper.destroy(true, true);
      const swiperWrapper = document.getElementById("swiperWrapper");
      if (!items.length) {
        swiperWrapper.innerHTML = `<div class="swiper-slide bg-slate-300 flex items-center justify-center text-sm font-bold">欢迎访问 HLOG</div>`;
      } else {
        swiperWrapper.innerHTML = items.slice(0, 5).map(p => `
          <div class="swiper-slide relative">
            <a href="/post.html?post=${p.id}" class="block h-full">
              <img src="${getPostCover(p)}" class="w-full h-full object-cover" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
              <div class="absolute bottom-10 left-10 right-10 text-white">
                <h3 class="text-2xl font-black mb-2">${escapeHtml(p.title)}</h3>
                <p class="text-sm opacity-90 line-clamp-2">${escapeHtml(p.summary || '点击阅读全文')}</p>
              </div>
            </a>
          </div>
        `).join("");
      }
      homeSwiper = new Swiper(".home-hero-swiper", {
        loop: items.length > 1,
        autoplay: { delay: 4000, disableOnInteraction: false },
        pagination: { el: ".swiper-pagination", clickable: true }
      });
    }

    async function loadPosts() {
      const params = new URLSearchParams(window.location.search);
      const tag = params.get("tag");
      const url = tag ? `/api/post/list?tag_id=${encodeURIComponent(tag)}&limit=12` : `/api/post/list?sort=recent&limit=12`;
      const data = await api(url);
      const posts = data.posts || [];
      
      document.getElementById("postGrid").innerHTML = posts.map(p => `
        <article class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl transition-all duration-300 group">
          <a href="/post.html?post=${p.id}">
            <div class="relative overflow-hidden h-48">
              <img src="${getPostCover(p)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
              <div class="absolute top-4 left-4"><span class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black text-sky-600 shadow-sm">${p.tags?.[0] || '默认'}</span></div>
            </div>
            <div class="p-6">
              <h3 class="text-lg font-bold text-slate-800 line-clamp-2 mb-3 group-hover:text-sky-600">${escapeHtml(p.title)}</h3>
              <p class="text-slate-500 text-xs line-clamp-2 font-medium mb-4">${escapeHtml(p.summary || '点击阅读全文...')}</p>
              <div class="flex items-center justify-between text-[10px] font-bold text-slate-400 border-t pt-4">
                <span>${new Date(p.created_at).toLocaleDateString()}</span>
                <span>${p.views || 0} 阅读</span>
              </div>
            </div>
          </a>
        </article>
      `).join("");

      renderHeroSwiper(posts);
      renderArchive(posts);
    }

    async function loadSidebar() {
      const data = await api("/api/post/list?sort=recent&limit=5");
      const posts = data.posts || [];
      document.getElementById("recentList").innerHTML = posts.map(p => `
        <a href="/post.html?post=${p.id}" class="flex items-center gap-3 group">
          <img src="${getPostCover(p)}" class="w-12 h-10 rounded-lg object-cover shadow-sm" />
          <div class="min-w-0"><h4 class="text-xs font-bold line-clamp-1 group-hover:text-sky-600">${escapeHtml(p.title)}</h4><p class="text-[10px] text-slate-400">${p.views} 阅读</p></div>
        </a>`).join("");
      
      const hotData = await api("/api/post/list?sort=views&limit=5");
      document.getElementById("hotList").innerHTML = (hotData.posts || []).map(p => `
        <a href="/post.html?post=${p.id}" class="flex items-center gap-3 group">
          <img src="${getPostCover(p)}" class="w-12 h-10 rounded-lg object-cover shadow-sm" />
          <div class="min-w-0"><h4 class="text-xs font-bold line-clamp-1 group-hover:text-amber-600">${escapeHtml(p.title)}</h4><p class="text-[10px] text-slate-400">${p.views} 阅读</p></div>
        </a>`).join("");

      const { tags } = await api("/api/tag/list");
      document.getElementById("tagCloud").innerHTML = (tags || []).map(t => `<a href="/?tag=${t.name}" class="text-[10px] px-3 py-1 bg-slate-50 rounded-full border hover:bg-sky-50 transition font-bold">${escapeHtml(t.name)}</a>`).join("");
      
      const stats = await api("/api/stats");
      document.getElementById("statTodayViews").textContent = stats.today_views ?? "0";
      document.getElementById("statTotalUsers").textContent = stats.total_users ?? "0";
    }

    // 🌟 新增：简单的归档逻辑渲染
    function renderArchive(posts) {
      const archive = {};
      posts.forEach(p => {
        const date = new Date(p.created_at);
        const key = `${date.getFullYear()}年${date.getMonth() + 1}月`;
        archive[key] = (archive[key] || 0) + 1;
      });
      document.getElementById("archiveList").innerHTML = Object.entries(archive).map(([key, count]) => `
        <div class="flex justify-between items-center py-1 hover:text-sky-600 cursor-pointer">
          <span>${key}</span>
          <span class="bg-slate-100 px-2 rounded-full text-xs">${count}</span>
        </div>
      `).join("");
    }

    loadPosts();
    loadSidebar();
  </script>
</body>
