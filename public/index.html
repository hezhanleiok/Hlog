<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 探索科技与生活的博客</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 导航菜单悬浮动画 */
    .nav-link {
      position: relative;
      font-size: 1.1rem;
      font-weight: 600;
      transition: color 0.3s;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background-color: #0ea5e9;
      transition: width 0.3s;
    }
    .nav-link:hover::after { width: 100%; }
    .nav-link:hover { color: #0ea5e9; }

    /* 下拉菜单样式 */
    .dropdown:hover .dropdown-menu { display: block; }
    
    /* 文章卡片图片裁剪 */
    .post-card-img {
      height: 240px;
      object-fit: cover;
      width: 100%;
    }
    
    /* 幻灯片样式 */
    .swiper-slide {
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-[#f8fafc] text-slate-800">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
      
      <div class="flex items-center gap-10">
        <a href="/" class="flex items-center gap-2 group">
          <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg group-hover:rotate-12 transition-transform">H</div>
          <span class="text-2xl font-black tracking-tighter text-slate-800">HLOG<span class="text-sky-500">.</span></span>
        </a>

        <nav class="hidden md:flex items-center gap-8">
          <a href="/" class="nav-link text-slate-700">首页</a>
          
          <div class="relative dropdown">
            <a href="#" class="nav-link text-slate-700 flex items-center gap-1">
              文章
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </a>
            <div class="dropdown-menu hidden absolute left-0 mt-2 w-48 bg-white border border-slate-100 shadow-xl rounded-xl py-2 animate-in fade-in slide-in-from-top-2">
              <a href="/?category=software" class="block px-4 py-2 hover:bg-sky-50 text-slate-600 hover:text-sky-600 font-medium">精品软件</a>
              <a href="/?category=tutorial" class="block px-4 py-2 hover:bg-sky-50 text-slate-600 hover:text-sky-600 font-medium">技术教程</a>
            </div>
          </div>

          <a href="/?category=software" class="nav-link text-slate-700">精品软件</a>
          <a href="/?category=tutorial" class="nav-link text-slate-700">技术教程</a>
          <a href="/about.html" class="nav-link text-slate-700">关于</a>
          <a href="/privacy.html" class="nav-link text-slate-700">隐私</a>
        </nav>
      </div>

      <div class="flex items-center gap-4">
        <div id="guestActions" class="flex items-center gap-4">
          <a href="/login.html" class="text-sm font-bold text-slate-500 hover:text-sky-600">登录</a>
          <a href="/register.html" class="bg-slate-900 text-white px-5 py-2.5 rounded-full text-sm font-bold hover:bg-slate-800 transition shadow-md">立即注册</a>
        </div>
        <div id="userActions" class="hidden flex items-center gap-4">
          <a href="/admin.html" class="bg-sky-50 text-sky-600 px-5 py-2.5 rounded-full text-sm font-bold hover:bg-sky-100 transition">管理后台</a>
          <button id="logoutBtn" class="text-sm font-bold text-slate-400 hover:text-red-500">退出</button>
        </div>
      </div>
    </div>
  </header>

  <section class="max-w-7xl mx-auto px-4 mt-8">
    <div id="bannerSlideshow" class="h-[480px] rounded-[2rem] overflow-hidden shadow-2xl border border-slate-100 relative group bg-slate-900">
      <div class="animate-pulse bg-slate-700 h-full w-full flex items-center justify-center text-slate-500 font-bold">加载最新Banner中...</div>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 py-16 grid grid-cols-1 lg:grid-cols-4 gap-12">
    
    <div class="lg:col-span-3">
      <div class="mb-10">
        <h2 class="text-4xl font-black text-slate-900 tracking-tight">最新发布</h2>
        <p class="text-slate-500 mt-2 font-medium">发现最前沿的技术教程与优质软件分享。</p>
      </div>

      <div id="postList" class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="animate-pulse bg-white rounded-3xl h-80 border border-slate-100"></div>
        <div class="animate-pulse bg-white rounded-3xl h-80 border border-slate-100"></div>
      </div>
    </div>

    <aside class="space-y-10">
      <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
        <h3 class="text-xl font-bold text-slate-900 mb-6 flex items-center gap-2">
          <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
          热门推荐
        </h3>
        <div id="hotPostsList" class="space-y-5">
          <div class="animate-pulse bg-slate-50 h-16 rounded-xl"></div>
          <div class="animate-pulse bg-slate-50 h-16 rounded-xl"></div>
        </div>
      </div>
    </aside>
  </main>

  <footer class="bg-slate-900 text-slate-400 mt-20">
    <div class="max-w-7xl mx-auto px-4 py-16 text-center text-sm">
      <p class="font-bold text-white mb-2">HLOG<span class="text-sky-500">.</span></p>
      <p>&copy; 2024 HLOG. 保留所有权利。</p>
      <p class="mt-1 text-xs text-slate-600">基于 Cloudflare Pages & D1 构建</p>
    </div>
  </footer>

  <script>
    // 权限检查
    const auth = JSON.parse(localStorage.getItem('hlog_auth') || 'null');
    if (auth?.token) {
      document.getElementById('guestActions').classList.add('hidden');
      document.getElementById('userActions').classList.remove('hidden');
    }
    document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('hlog_auth'); location.reload(); });

    async function api(path) { return await (await fetch(path)).json(); }
    const escapeHtml = s => String(s ?? "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

    // 🌟 辅助函数：从 Base64 内容中提取第一张图片的 Src
    function extractFirstImage(htmlContent) {
      if (!htmlContent) return null;
      const imgRegex = /<img[^>]+src="([^">]+)"/g;
      const match = imgRegex.exec(htmlContent);
      return match ? match[1] : null;
    }

    // 🌟 加载顶部 Banner (使用最新文章封面图)
    async function loadBanner() {
      try {
        const { posts } = await api('/api/posts?status=published&limit=3');
        const container = document.getElementById('bannerSlideshow');
        
        if (!posts || posts.length === 0) {
          container.innerHTML = `<div class="h-full w-full flex items-center justify-center text-slate-500 font-bold">欢迎访问 HLOG</div>`;
          return;
        }

        // 目前默认显示最新一篇，未来可以结合 Swiper.js 实现轮播
        const topPost = posts[0];
        // 🌟 修复图片来源：优先 cover_url，其次提取正文图，最后使用纯色
        const coverImage = topPost.cover_url || extractFirstImage(topPost.content) || 'rgba(14,165,233,0.1)';
        
        container.innerHTML = `
          <div class="swiper-slide h-full w-full flex items-end" style="background-image: linear-gradient(to top, rgba(15,23,42,0.9), rgba(15,23,42,0)), url('${coverImage}')">
            <div class="p-16 max-w-3xl">
              <span class="bg-sky-500 text-white px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest mb-4 inline-block">最新头条</span>
              <a href="/post.html?post=${topPost.id}" class="block group">
                <h1 class="text-5xl font-black text-white leading-tight group-hover:text-sky-400 transition-colors line-clamp-2">${escapeHtml(topPost.title)}</h1>
                <p class="text-slate-300 mt-5 text-lg font-medium line-clamp-2">${escapeHtml(topPost.summary || '点击阅读全文，探索更多精彩内容...')}</p>
              </a>
            </div>
          </div>
        `;
      } catch (err) { console.error('Banner加载失败:', err); }
    }

    // 加载文章列表
    async function loadPosts() {
      try {
        const { posts } = await api('/api/posts?status=published');
        const container = document.getElementById('postList');
        const hotContainer = document.getElementById('hotPostsList');
        
        if (!posts || posts.length === 0) {
          container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 font-bold">暂无文章发布</div>`;
          hotContainer.innerHTML = '<div class="text-slate-400 text-xs">暂无推荐</div>';
          return;
        }

        // 1. 渲染左侧文章列表
        container.innerHTML = posts.map(post => {
          // 🌟 修复图片来源：优先 cover_url，其次提取正文图，最后使用 picsum (保险)
          const coverImage = post.cover_url || extractFirstImage(post.content) || `https://picsum.photos/seed/${post.id}/800/600`;
          
          return `
            <article class="group bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all overflow-hidden">
              <a href="/post.html?post=${post.id}" class="block">
                <div class="overflow-hidden"><img src="${coverImage}" class="post-card-img group-hover:scale-105 transition-transform" alt="${post.title}"></div>
                <div class="p-8">
                  <h3 class="text-2xl font-bold text-slate-800 group-hover:text-sky-600 transition-colors line-clamp-2 leading-snug">${escapeHtml(post.title)}</h3>
                  <p class="text-slate-500 mt-3 text-sm line-clamp-2 font-medium">${escapeHtml(post.summary || '点击阅读全文...')}</p>
                  <div class="flex items-center justify-between mt-6 pt-6 border-t border-slate-100">
                    <span class="text-xs font-bold text-slate-600">HLOG 作者</span>
                    <span class="text-xs font-bold text-slate-400">${new Date(post.created_at).toLocaleDateString()}</span>
                  </div>
                </div>
              </a>
            </article>
          `;
        }).join('');

        // 2. 渲染右侧热门文章 (🌟 修复：图片使用文章封面)
        hotContainer.innerHTML = posts.slice(0, 4).map(post => {
           // 🌟 修复侧边栏图片来源
           const coverImage = post.cover_url || extractFirstImage(post.content) || `https://picsum.photos/seed/${post.id}/100/100`;
           return `
            <a href="/post.html?post=${post.id}" class="flex items-center gap-4 group">
              <img src="${coverImage}" class="w-16 h-16 rounded-xl object-cover shrink-0" alt="${post.title}">
              <div class="flex-1 min-w-0">
                <h4 class="text-sm font-bold text-slate-700 group-hover:text-sky-600 transition-colors line-clamp-2 leading-snug">${escapeHtml(post.title)}</h4>
                <p class="text-xs text-slate-400 mt-1">${new Date(post.created_at).toLocaleDateString()}</p>
              </div>
            </a>
           `;
        }).join('');

      } catch (err) { console.error('列表加载失败:', err); }
    }

    // 初始化
    loadBanner();
    loadPosts();
  </script>
</body>
</html>
