  <footer class="bg-white border-t border-slate-200 mt-12 py-8 text-center">

  <script src="https://lib.baomitu.com/Swiper/11.0.5/swiper-bundle.min.js"></script>
  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    const authLinks = document.getElementById("authLinks");
    
    if (auth?.token) {
      authLinks.innerHTML = `<a href="/admin.html" class="px-5 py-2 bg-indigo-600 text-white rounded-xl text-sm font-black shadow-lg">管理后台</a>`;
    } else {
      authLinks.innerHTML = `
        <a href="/login.html" class="text-sm font-black text-slate-600 hover:text-indigo-600">登录</a>
        <a href="/register.html" class="px-5 py-2 bg-slate-800 text-white rounded-xl text-sm font-black shadow-lg hover:bg-slate-700 transition">注册</a>
      `;
    }

    async function api(path) {
      return (await fetch(path)).json().catch(() => ({}));
    }

    // ⭐ 新增：优先请求静态 JSON 文件，如果失败（如本地开发时）则自动回退调用动态 API
    async function fetchStaticOrApi(staticPath, apiPath) {
      try {
        const res = await fetch(staticPath);
        if (res.ok) return await res.json();
      } catch (e) {}
      // 静态获取失败，走原始 API
      return api(apiPath);
    }

    function getCover(p) {
      if(p.cover_url) return p.cover_url;
      const m = (p.content||"").match(/<img[^>]+src="([^">]+)"/);
      return m ? m[1] : "https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png";
    }

    function escapeHtml(s) { return String(s || "").replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[m])); }

    function toggleArchive(id) {
        const el = document.getElementById(id);
        if(el) el.classList.toggle('hidden');
    }

    async function load() {
      // ⭐ 修改点：使用 fetchStaticOrApi 替换原有的 api() 调用
      const [catData, stats, siteStats, annRes, postsRes, hotData, commentsData, tagsData] = await Promise.all([
        fetchStaticOrApi("/static/category-list.json", "/api/category/list"),
        fetchStaticOrApi("/static/stats.json", "/api/stats"),
        fetchStaticOrApi("/static/site-stats.json", "/api/site/stats"),
        fetchStaticOrApi("/static/announcement-latest.json", "/api/admin/announcement/latest"),
        fetchStaticOrApi("/static/post-list-recent.json", "/api/post/list?limit=15&sort=recent"),
        fetchStaticOrApi("/static/post-list-views.json", "/api/post/list?sort=views&limit=5"),
        fetchStaticOrApi("/static/comment-latest.json", "/api/comment/latest?limit=4"),
        fetchStaticOrApi("/static/tag-list.json", "/api/tag/list")
      ]);

      const cats = catData.categories || [];
      document.getElementById("navCatList").innerHTML = cats.map(c => 
        `<a href="/?cat=${c.id}" class="block px-5 py-2.5 hover:bg-indigo-50 font-bold text-slate-600 transition-colors">${c.name}</a>`).join("");

      document.getElementById("stat_posts").textContent = siteStats.post_count || 0;
      document.getElementById("stat_tags").textContent = (tagsData.tags || []).length;
      document.getElementById("statTodayViews").textContent = stats.today_views || 0;
      document.getElementById("statTotalViews").textContent = siteStats.total_views || 0;

      // 渲染标签云
      const tagsList = tagsData.tags || [];
      document.getElementById("sidebarTags").innerHTML = tagsList.map(t => 
        `<a href="/?tag=${encodeURIComponent(t.name)}" class="bg-slate-100 text-slate-600 hover:bg-indigo-600 hover:text-white transition px-3 py-1 rounded-lg text-[11px] font-bold">${escapeHtml(t.name)}</a>`
      ).join("") || '<div class="text-xs text-slate-400">暂无标签</div>';

      const announcements = annRes.data || [];
      const noticeContainer = document.getElementById("siteNoticeDisplay");
      if (announcements.length > 0) {
        noticeContainer.innerHTML = '<ul class="space-y-3 m-0 p-0">' + announcements.map(a => `<li class="relative pl-4 text-sm text-slate-600 before:content-[''] before:absolute before:left-0 before:top-[7px] before:w-1.5 before:h-1.5 before:bg-indigo-600 before:rounded-sm leading-relaxed">${escapeHtml(a.content)}</li>`).join("") + '</ul>';
      }

      const posts = postsRes.posts || [];
      if(posts.length > 0) {
        document.getElementById("posterImg").src = getCover(posts[0]);
        document.getElementById("posterTitle").textContent = posts[0].title;
        document.getElementById("posterLink").href = `/post.html?post=${posts[0].id}`;
      }
      
      document.getElementById("postGrid").innerHTML = posts.map(p => `
        <div class="post-item p-6 group hover:bg-slate-50 transition-colors">
          <a href="/post.html?post=${p.id}" class="flex flex-col md:flex-row gap-6">
            <div class="w-full md:w-64 h-40 overflow-hidden rounded-xl bg-slate-50 shrink-0">
              <img src="${getCover(p)}" onerror="this.src='https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy" />
            </div>
            <div class="flex-1 min-w-0 flex flex-col justify-between">
              <div>
                <h3 class="text-xl font-black text-slate-800 mb-2 group-hover:text-indigo-600 line-clamp-1">${escapeHtml(p.title)}</h3>
                <p class="text-sm text-slate-500 line-clamp-2 leading-relaxed">${escapeHtml(p.summary || '阅读更多内容...')}</p>
              </div>
              <div class="flex gap-4 text-[10px] font-black text-slate-400 mt-4 uppercase">
                <span>${new Date(p.created_at).toLocaleDateString()}</span>
                <span>${p.views} 阅读</span>
              </div>
            </div>
          </a>
        </div>`).join("") || '<div class="p-6 text-center text-slate-400">暂无文章</div>';

      if (posts.length > 0) {
        document.getElementById("swiperWrapper").innerHTML = posts.slice(0, 5).map(p => `
          <div class="swiper-slide relative">
            <a href="/post.html?post=${p.id}" class="block h-full">
              <img src="${getCover(p)}" onerror="this.src='https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png'" class="w-full h-full object-cover" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
              <div class="absolute bottom-12 left-10 text-white font-black text-3xl">${escapeHtml(p.title)}</div>
            </a>
          </div>`).join("");
        new Swiper(".home-hero-swiper", { pagination: { el: ".swiper-pagination", clickable: true }, autoplay: { delay: 5000 }, loop: true, effect: 'fade' });
      }

      document.getElementById("hotList").innerHTML = (hotData.posts || []).map(p => `
        <a href="/post.html?post=${p.id}" class="flex gap-3 group bg-slate-50 p-2 rounded-xl hover:bg-indigo-50 transition-colors border border-slate-100">
          <img src="${getCover(p)}" onerror="this.src='https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png'" class="w-16 h-14 rounded-lg object-cover shrink-0" />
          <div class="min-w-0 flex flex-col justify-center">
            <h4 class="text-xs font-black text-slate-700 line-clamp-2 group-hover:text-indigo-600 transition leading-snug">${escapeHtml(p.title)}</h4>
          </div>
        </a>`).join("");

      document.getElementById("latestComments").innerHTML = (commentsData.comments || []).map(c => `
        <div class="flex gap-3 items-start bg-slate-50/50 p-3 rounded-xl border border-slate-100">
           <img src="${c.avatar || 'https://ui-avatars.com/api/?name='+encodeURIComponent(c.name)+'&background=random&color=fff'}" class="w-8 h-8 rounded-full shadow-sm shrink-0">
           <div class="min-w-0">
             <div class="text-xs font-black text-indigo-600 mb-1">${escapeHtml(c.name)}</div>
             <div class="text-[11px] text-slate-600 line-clamp-2 leading-relaxed">${escapeHtml(c.content)}</div>
           </div>
        </div>`).join("");

      const archive = {};
      posts.forEach(p => {
        const d = new Date(p.created_at);
        const key = `${d.getFullYear()}年${d.getMonth() + 1}月`;
        if(!archive[key]) archive[key] = [];
        archive[key].push(p);
      });
      document.getElementById("archiveList").innerHTML = Object.entries(archive).map(([key, list], i) => `
        <div class="mb-2">
          <div onclick="toggleArchive('archive-${i}')" class="flex justify-between items-center py-2 px-3 rounded-xl hover:bg-indigo-50 cursor-pointer transition-all group">
            <span class="text-sm font-bold text-slate-600 group-hover:text-indigo-600">${key}</span>
            <span class="bg-slate-100 px-2 py-0.5 rounded-full text-[10px] font-black text-slate-400">${list.length} 篇</span>
          </div>
          <ul id="archive-${i}" class="hidden pl-4 pr-2 py-2 space-y-2 border-l-2 border-indigo-100 ml-3 mt-1">
            ${list.map(p => `<li><a href="/post.html?post=${p.id}" class="text-xs text-slate-500 hover:text-indigo-600 line-clamp-1 block py-1">${escapeHtml(p.title)}</a></li>`).join("")}
          </ul>
        </div>`).join("");
    }
    load();
  </script>
</body>
