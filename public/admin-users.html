<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 用户管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin-style.css" />
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <a href="/admin.html#dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">回到主面板</a>
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">系统与用户</div>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 bg-[#334155] text-white border-l-4 border-sky-500">用户管理</a>
        <a href="/admin-profile.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">个人中心</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 class="text-lg font-bold text-slate-700">用户管理</h2>
        <div class="flex gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600 hover:text-sky-700">查看前台</a>
          <button id="logoutBtn" class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold">退出</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200">
              <tr><th class="px-6 py-4">账号</th><th class="px-6 py-4">状态</th><th class="px-6 py-4">操作</th></tr>
            </thead>
            <tbody id="usersTbody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (!auth?.token || auth.role !== "admin") location.href = "/login.html";
    async function api(path, options = {}) {
      options.headers = { Authorization: `Bearer ${auth.token}`, "Content-Type": "application/json" };
      return await (await fetch(path, options)).json().catch(() => ({}));
    }
    document.getElementById("logoutBtn").addEventListener("click", () => { localStorage.removeItem("hlog_auth"); location.href = "/login.html"; });

    async function loadUsers() {
      const { users } = await api("/api/admin/users/list?limit=200");
      document.getElementById("usersTbody").innerHTML = (users || []).map(u => `
        <tr class="hover:bg-slate-50">
          <td class="px-6 py-4 font-bold">${u.display_name} (${u.email})</td>
          <td class="px-6 py-4">${u.disabled ? '<span class="text-red-600">已封禁</span>' : '<span class="text-emerald-600">正常</span>'}</td>
          <td class="px-6 py-4"><button data-toggle="${u.id}" class="wp-btn text-xs">${u.disabled ? "解封" : "封禁"}</button></td>
        </tr>
      `).join("");
      document.querySelectorAll("[data-toggle]").forEach(b => b.addEventListener("click", async () => {
        if(confirm("确定操作？")) { await api("/api/admin/users/toggle", { method: "POST", body: JSON.stringify({ user_id: Number(b.dataset.toggle) }) }); loadUsers(); }
      }));
    }
    loadUsers();
  </script>
</body>
</html>
