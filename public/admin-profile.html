<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 个人中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin-style.css" />
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <a href="/admin.html#dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">回到主面板</a>
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">系统与用户</div>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">用户管理</a>
        <a href="/admin-profile.html" class="flex items-center px-6 py-3 bg-[#334155] text-white border-l-4 border-sky-500">个人中心</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 class="text-lg font-bold text-slate-700">个人中心</h2>
        <div class="flex gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600">查看前台</a>
          <button id="logoutBtn" class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold">退出</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <div class="max-w-2xl bg-white rounded-xl border border-slate-200 shadow-sm p-8 space-y-5">
          <h3 class="font-bold text-xl border-b pb-4">修改资料</h3>
          <img id="avatarPreview" src="" class="w-24 h-24 rounded-full bg-slate-100 object-cover" />
          <input id="avatarUrlInput" type="hidden" />
          <input id="avatarFile" type="file" accept="image/*" class="text-sm" />
          <input id="displayNameInput" class="w-full border p-3 rounded" placeholder="昵称" />
          <input id="passwordInput" type="password" class="w-full border p-3 rounded" placeholder="新密码 (不改留空)" />
          <button id="saveProfileBtn" class="wp-btn wp-btn-primary">保存修改</button>
        </div>
      </main>
    </div>
  </div>

  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (!auth?.token) location.href = "/login.html";
    async function api(path, options = {}) {
      options.headers = { Authorization: `Bearer ${auth.token}`, "Content-Type": "application/json" };
      return await (await fetch(path, options)).json().catch(() => ({}));
    }
    document.getElementById("logoutBtn").addEventListener("click", () => { localStorage.removeItem("hlog_auth"); location.href = "/login.html"; });

    const avatarFile = document.getElementById("avatarFile");
    avatarFile.addEventListener("change", () => {
      const reader = new FileReader();
      reader.onload = () => { document.getElementById("avatarPreview").src = reader.result; document.getElementById("avatarUrlInput").value = reader.result; };
      reader.readAsDataURL(avatarFile.files[0]);
    });

    document.getElementById("saveProfileBtn").addEventListener("click", async () => {
      await api("/api/user/update", {
        method: "POST",
        body: JSON.stringify({
          avatar_url: document.getElementById("avatarUrlInput").value || null,
          display_name: document.getElementById("displayNameInput").value,
          password: document.getElementById("passwordInput").value || ""
        })
      });
      alert("修改成功");
    });

    async function load() {
      const me = await api("/api/user/me");
      const p = me.user || me;
      document.getElementById("avatarPreview").src = p.avatar_url || "";
      document.getElementById("avatarUrlInput").value = p.avatar_url || "";
      document.getElementById("displayNameInput").value = p.display_name || "";
    }
    load();
  </script>
</body>
</html>
