<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>关于 - HLOG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

    .prose p { margin-bottom: 1.5rem; line-height: 1.8; color: #475569; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-10">
        <a href="/" class="text-2xl font-black text-sky-600 tracking-tighter">HLOG</a>
        <nav class="hidden md:flex items-center gap-10">
          <a href="/" class="nav-link text-slate-700">首页</a>
          <div class="relative dropdown">
            <a href="#" class="nav-link text-slate-700 flex items-center gap-1">文章 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg></a>
            <div class="dropdown-menu hidden absolute left-0 mt-2 w-48 bg-white border border-slate-100 shadow-xl rounded-xl py-2 z-50">
              <a href="/?tag=精品软件" class="block px-4 py-2 hover:bg-sky-50 text-slate-600 font-bold">精品软件</a>
              <a href="/?tag=技术教程" class="block px-4 py-2 hover:bg-sky-50 text-slate-600 font-bold">技术教程</a>
            </div>
          </div>
          <a href="/about.html" class="nav-link text-sky-600">关于</a>
          <a href="/privacy.html" class="nav-link text-slate-700">隐私</a>
        </nav>
      </div>
      <nav class="flex items-center gap-3">
        <a href="/login.html" id="loginLink" class="px-3 py-2 rounded-lg text-sm font-bold text-slate-600">登录</a>
        <a href="/admin.html" id="adminLink" class="px-4 py-2 rounded-lg bg-sky-600 text-white hidden font-bold">后台</a>
        <button id="logoutBtn" class="px-3 py-2 rounded-lg text-sm font-bold bg-slate-800 text-white hidden">退出</button>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 md:p-12">
      <div class="flex flex-col items-center text-center mb-10">
        <img src="https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png" class="w-32 h-32 rounded-3xl object-cover ring-4 ring-slate-50 shadow-md mb-6" alt="XIAOHE" />
        <h1 class="text-4xl font-black text-slate-900 mb-2">关于 XIAOHE</h1>
        <p class="text-sky-600 font-bold tracking-widest uppercase text-sm">一个互联网爱好分享者</p>
      </div>

      <div class="prose max-w-none text-lg">
        <p>欢迎来到我的个人博客 <strong>HLOG</strong>。这里是我记录技术心得、分享优质软件以及探索互联网生活的空间。</p>
        <p>作为一个热衷于探索各种新技术的爱好者，我深信知识的价值在于分享。本站所有的内容都源于我的日常实践和思考，希望能对同样走在探索之路上的你有所帮助。</p>
        
        <h2 class="text-2xl font-bold text-slate-800 mt-10 mb-4 border-l-4 border-sky-500 pl-4">联系我</h2>
        <p>如果你有任何建议、合作意向，或者只是想交个朋友，可以通过以下方式找到我：</p>
        <ul class="space-y-3 mt-4">
          <li class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center text-xs">X</span>
            <a href="https://x.com/xiaoheyiyi" target="_blank" class="text-sky-600 font-bold hover:underline">@xiaoheyiyi</a>
          </li>
          <li class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-lg bg-sky-500 text-white flex items-center justify-center text-xs">TG</span>
            <a href="https://t.me/xiaoheok" target="_blank" class="text-sky-600 font-bold hover:underline">Xiaohe Telegram</a>
          </li>
        </ul>
      </div>
    </div>
  </main>

  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (auth?.token) {
      document.getElementById("loginLink").classList.add("hidden");
      if (auth.role === "admin") document.getElementById("adminLink").classList.remove("hidden");
      document.getElementById("logoutBtn").classList.remove("hidden");
    }
    document.getElementById("logoutBtn")?.addEventListener("click", () => { localStorage.removeItem("hlog_auth"); location.reload(); });
  </script>
</body>
</html>
