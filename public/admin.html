<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
  <link rel="stylesheet" href="/admin-style.css" />
  <style>
    .line-clamp-1 {
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
    }
    .ql-editor {
      min-height: 220px;
    }
    .hlog-prose pre {
      background: #0b1220;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 12px;
      overflow: auto;
    }
    .admin-menu-item-active {
      background-color: #f0f9ff !important;
      color: #0284c7 !important;
      font-weight: 700;
      border-right: 4px solid #0284c7;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="admin-layout flex min-h-screen">
    <aside class="admin-sidebar w-64 bg-white border-r border-slate-200 flex-shrink-0">
      <div class="p-6 text-2xl font-black text-sky-600 italic border-b">HLOG Admin</div>
      <nav class="mt-4 px-4 space-y-1">
        <a href="#dashboard" id="menu-dashboard" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-50 text-sm font-bold">仪表盘</a>
        <div class="px-4 py-2 text-xs font-black text-slate-400 uppercase tracking-wider mt-4">内容</div>
        <a href="#post-list" id="menu-post-list" class="flex items-center px-4 py-2 rounded-lg text-sm hover:bg-slate-50">文章列表</a>
        <a href="#publish" id="menu-post-publish" class="flex items-center px-4 py-2 rounded-lg text-sm hover:bg-slate-50">发布文章</a>
        <a href="#drafts" id="menu-post-drafts" class="flex items-center px-4 py-2 rounded-lg text-sm hover:bg-slate-50">草稿箱</a>
        <div class="px-4 py-2 text-xs font-black text-slate-400 uppercase tracking-wider mt-4">系统</div>
        <a href="/admin-comments.html" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-50 text-sm font-bold">评论管理</a>
        <a href="#settings" id="menu-settings" class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-50 text-sm font-bold">系统设置</a>
      </nav>
    </aside>

    <div class="admin-content flex-1 flex flex-col">
      <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
        <h2 class="text-xl font-bold text-slate-800">管理面板</h2>
        <div class="flex items-center gap-4">
          <a href="/" class="text-sm font-bold text-slate-500 hover:text-sky-600">查看站点</a>
          <button id="logoutBtn" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">退出登录</button>
        </div>
      </header>

      <main class="p-8">
        <section id="panel-dashboard" class="hidden">
          <div class="flex items-center justify-between mb-8">
            <h3 class="text-2xl font-black text-slate-800">数据概览</h3>
            <button id="refreshStatsBtn" class="bg-white border px-4 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50">刷新</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm text-center">
              <div class="text-xs font-black text-slate-400 uppercase tracking-widest">今日阅读</div>
              <div id="statTodayViews" class="text-4xl font-black text-slate-900 mt-2">0</div>
            </div>
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm text-center">
              <div class="text-xs font-black text-slate-400 uppercase tracking-widest">总文章数</div>
              <div id="statTotalPosts" class="text-4xl font-black text-slate-900 mt-2">0</div>
            </div>
            <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm text-center">
              <div class="text-xs font-black text-slate-400 uppercase tracking-widest">注册用户</div>
              <div id="statTotalUsers" class="text-4xl font-black text-slate-900 mt-2">0</div>
            </div>
          </div>
        </section>

        <section id="panel-post-list" class="hidden">
          <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
            <table class="w-full text-left border-collapse">
              <thead class="bg-slate-50 text-xs font-black text-slate-400 uppercase">
                <tr><th class="px-6 py-4">标题</th><th class="px-6 py-4">数据</th><th class="px-6 py-4">操作</th></tr>
              </thead>
              <tbody id="postsTbodyPublished"></tbody>
            </table>
          </div>
        </section>

        <section id="panel-drafts" class="hidden">
          <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm">
            <table class="w-full text-left border-collapse">
              <thead class="bg-slate-50 text-xs font-black text-slate-400 uppercase">
                <tr><th class="px-6 py-4">标题</th><th class="px-6 py-4">最后修改</th><th class="px-6 py-4">操作</th></tr>
              </thead>
              <tbody id="postsTbodyDrafts"></tbody>
            </table>
          </div>
        </section>

        <section id="panel-publish" class="hidden">
          <div class="max-w-4xl bg-white p-8 rounded-2xl border border-slate-100 shadow-sm">
            <input id="postId" type="hidden" />
            <input id="titleInput" type="text" placeholder="请输入标题..." class="w-full mb-6 p-4 bg-slate-50 border rounded-2xl font-bold outline-none focus:ring-2 focus:ring-sky-500" />
            <div id="contentEditor" class="mb-6"></div>
            <button id="saveBtn" class="w-full bg-sky-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-sky-700 transition">保存并发布文章</button>
          </div>
        </section>

        <section id="panel-settings" class="hidden">
          <div class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm text-center text-slate-500">
            ⚙️ 系统设置功能开发中，敬请期待。
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.min.js"></script>
  <script>
    // ========== 全局错误捕获 ==========
    window.addEventListener('error', function(event) {
      console.error('全局错误捕获:', event.error);
      alert('页面发生错误，请查看控制台（F12）获取详细信息。');
    });

    // ========== 工具函数 ==========
    function safeGetElement(id) {
      const el = document.getElementById(id);
      if (!el) console.warn(`元素 #${id} 不存在`);
      return el;
    }

    // 简易防XSS
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // ========== 认证检查 ==========
    let auth = null;
    try {
      auth = JSON.parse(localStorage.getItem('hlog_auth') || 'null');
    } catch(e) {
      console.error('解析 localStorage 失败', e);
    }
    if (!auth || !auth.token || auth.role !== 'admin') {
      alert('登录失效，请重新登录');
      location.href = '/login.html';
    }

    // ========== API 请求封装 ==========
    async function api(path, options = {}) {
      const headers = options.headers || {};
      headers.Authorization = 'Bearer ' + auth.token;
      headers['Content-Type'] = 'application/json';
      try {
        console.log(`请求 ${options.method || 'GET'} ${path}`, options.body);
        const res = await fetch(path, { ...options, headers });
        if (res.status === 401) {
          localStorage.removeItem('hlog_auth');
          location.href = '/login.html';
          return null;
        }
        const data = await res.json();
        console.log(`响应 ${path}:`, data);
        return data;
      } catch (err) {
        console.error('API 请求失败:', err);
        alert(`网络错误：${err.message}`);
        return null;
      }
    }

    // ========== 数据加载函数 ==========
    async function loadDashboard() {
      const stats = await api('/api/stats');
      if (stats) {
        const todayViews = safeGetElement('statTodayViews');
        const totalPosts = safeGetElement('statTotalPosts');
        const totalUsers = safeGetElement('statTotalUsers');
        if (todayViews) todayViews.textContent = stats.today_views || 0;
        if (totalPosts) totalPosts.textContent = stats.total_posts || 0;
        if (totalUsers) totalUsers.textContent = stats.total_users || 0;
      }
    }

    async function loadPostsTable(status) {
      const tbodyId = status === 'published' ? 'postsTbodyPublished' : 'postsTbodyDrafts';
      const tbody = safeGetElement(tbodyId);
      if (!tbody) return;
      const data = await api(`/api/posts?status=${status}`);
      const posts = data?.posts || [];
      tbody.innerHTML = posts.map(p => `
        <tr>
          <td class="px-6 py-4 font-bold border-b">${escapeHtml(p.title)}</td>
          <td class="px-6 py-4 border-b">${p.views || 0} views</td>
          <td class="px-6 py-4 border-b">
            <button class="edit-post-btn text-sky-600 font-bold" data-id="${p.id}" data-title="${escapeHtml(p.title)}" data-content="${escapeHtml(p.content || '')}">编辑</button>
          </td>
        </tr>
      `).join('');

      // 绑定编辑按钮
      document.querySelectorAll(`#${tbodyId} .edit-post-btn`).forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const title = btn.dataset.title;
          const content = btn.dataset.content;
          const postIdInput = safeGetElement('postId');
          const titleInput = safeGetElement('titleInput');
          if (postIdInput) postIdInput.value = id;
          if (titleInput) titleInput.value = title;
          if (window.quill) quill.root.innerHTML = content;
          location.hash = 'publish';
        });
      });
    }

    // ========== 保存文章 ==========
    async function savePost() {
      const id = safeGetElement('postId')?.value;
      const title = safeGetElement('titleInput')?.value.trim();
      const content = window.quill ? quill.root.innerHTML : '';
      if (!title) {
        alert('请填写标题');
        return;
      }
      const payload = { title, content, status: 'published' };
      let url = '/api/posts';
      let method = 'POST';
      if (id) {
        url = `/api/posts/${id}`;
        method = 'PUT';
      }
      const result = await api(url, { method, body: JSON.stringify(payload) });
      if (result && result.success !== false) {
        alert(id ? '文章更新成功' : '发布成功');
        // 清空表单
        const postIdInput = safeGetElement('postId');
        const titleInput = safeGetElement('titleInput');
        if (postIdInput) postIdInput.value = '';
        if (titleInput) titleInput.value = '';
        if (window.quill) quill.root.innerHTML = '';
        loadPostsTable('published');
        loadDashboard();
        location.hash = 'post-list';
      } else {
        alert('操作失败，请重试');
      }
    }

    // ========== 路由切换 ==========
    async function route() {
      const tab = location.hash.slice(1) || 'dashboard';
      const panels = ['dashboard', 'post-list', 'drafts', 'publish', 'settings'];
      panels.forEach(p => {
        const el = safeGetElement(`panel-${p}`);
        if (el) el.classList.toggle('hidden', p !== tab);
      });

      // 高亮菜单
      document.querySelectorAll('.admin-sidebar nav a').forEach(el => el.classList.remove('admin-menu-item-active'));
      let activeId = '';
      if (tab === 'dashboard') activeId = 'menu-dashboard';
      else if (tab === 'post-list') activeId = 'menu-post-list';
      else if (tab === 'drafts') activeId = 'menu-post-drafts';
      else if (tab === 'publish') activeId = 'menu-post-publish';
      else if (tab === 'settings') activeId = 'menu-settings';
      const activeMenu = safeGetElement(activeId);
      if (activeMenu) activeMenu.classList.add('admin-menu-item-active');

      // 加载数据
      if (tab === 'dashboard') await loadDashboard();
      if (tab === 'post-list') await loadPostsTable('published');
      if (tab === 'drafts') await loadPostsTable('drafts');
    }

    // ========== 初始化 Quill ==========
    let quill = null;
    function initQuill() {
      const editorContainer = safeGetElement('contentEditor');
      if (!editorContainer) {
        console.warn('编辑器容器未找到，稍后重试');
        setTimeout(initQuill, 100);
        return;
      }
      try {
        quill = new Quill('#contentEditor', {
          theme: 'snow',
          modules: {
            toolbar: [
              [{ header: [1, 2, false] }],
              ['bold', 'italic'],
              ['link', 'image', 'video'],
              ['code-block']
            ]
          }
        });
        window.quill = quill;
        console.log('Quill 初始化成功');
      } catch(e) {
        console.error('Quill 初始化失败', e);
      }
    }

    // ========== 绑定事件 ==========
    window.addEventListener('hashchange', route);
    window.addEventListener('load', () => {
      initQuill();
      route();
      if (!location.hash) location.hash = 'dashboard';
    });

    const refreshBtn = safeGetElement('refreshStatsBtn');
    if (refreshBtn) refreshBtn.addEventListener('click', loadDashboard);
    const logoutBtn = safeGetElement('logoutBtn');
    if (logoutBtn) logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('hlog_auth');
      location.href = '/login.html';
    });
    const saveBtn = safeGetElement('saveBtn');
    if (saveBtn) saveBtn.addEventListener('click', savePost);
  </script>
</body>
</html>
