<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 管理面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
  <link rel="stylesheet" href="/admin-style.css" />
  <style>
    /* 上传状态提示样式 */
    .upload-loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      font-weight: bold;
      color: #0284c7;
    }
    /* 激活菜单样式 */
    .menu-active { background-color: #334155; color: white; border-left: 4px solid #0ea5e9; }
  </style>
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <div class="px-6 py-2 text-xs font-bold text-slate-500 uppercase">核心面板</div>
        <a href="#dashboard" id="menu-dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">仪表盘概览</a>
        <a href="#notice" id="menu-notice" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white text-red-400">📢 站点公告管理</a>
        
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">创作与内容</div>
        <a href="#publish" id="menu-publish" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">撰写新文章</a>
        <a href="#post-list" id="menu-post-list" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">已发布文章</a>
        <a href="#drafts" id="menu-drafts" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">草稿箱</a>
        <a href="#categories" id="menu-categories" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">文章分类管理</a>
        
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">系统与用户</div>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">用户管理</a>
        <a href="#invites" id="menu-invites" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">邀请码管理</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 id="pageTitle" class="text-lg font-bold text-slate-700">管理面板</h2>
        <div class="flex items-center gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600 hover:text-sky-700">查看站点</a>
          <button id="logoutBtn" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">退出登录</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <section id="panel-dashboard" class="hidden space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <div class="text-sm font-bold text-slate-400 uppercase">今日阅读量</div>
              <div id="statTodayViews" class="text-3xl font-black text-slate-800 mt-1">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <div class="text-sm font-bold text-slate-400 uppercase">文章总数</div>
              <div id="statTotalPosts" class="text-3xl font-black text-slate-800 mt-1">0</div>
            </div>
          </div>
          <button id="refreshStatsBtn" class="wp-btn">刷新数据</button>
        </section>

        <section id="panel-notice" class="hidden max-w-2xl mx-auto">
          <div class="bg-white p-8 rounded-2xl border shadow-sm">
            <h3 class="text-lg font-black text-red-600 mb-4 flex items-center gap-2">📢 编辑首页公告</h3>
            <textarea id="noticeInput" rows="6" class="w-full border border-slate-200 rounded-xl p-4 outline-none focus:border-red-500 transition-all"></textarea>
            <button id="saveNoticeBtn" class="w-full mt-6 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-700">更新并发布公告</button>
          </div>
        </section>

        <section id="panel-categories" class="hidden max-w-3xl mx-auto">
          <div class="bg-white p-6 rounded-xl border shadow-sm mb-6">
            <h3 class="font-bold mb-4">管理分类</h3>
            <div class="flex gap-2">
              <input id="newCatName" class="flex-1 border rounded-lg px-4 py-2 outline-none" placeholder="新分类名称..." />
              <button id="addCatBtn" class="bg-sky-600 text-white px-6 py-2 rounded-lg font-bold">添加分类</button>
            </div>
          </div>
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b"><tr><th class="px-6 py-3">名称</th><th class="px-6 py-3">操作</th></tr></thead>
              <tbody id="catTbody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </section>

        <section id="panel-publish" class="hidden max-w-5xl mx-auto space-y-4">
          <input id="postId" type="hidden" />
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <input id="titleInput" type="text" placeholder="文章标题..." class="w-full text-2xl font-bold outline-none" />
          </div>
          
          <div class="bg-white rounded-xl border border-slate-200 p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-widest">文章分类</label>
              <select id="postCategory" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500">
                <option value="">-- 请选择分类 --</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-widest">文章标签 (以逗号分隔)</label>
              <input id="tagsInput" type="text" placeholder="精品软件, 教程" class="w-full border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500" />
            </div>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 flex flex-col relative overflow-hidden">
            <div id="editorUploadStatus" class="upload-loading hidden">图片上传中...</div>
            <div id="contentEditor" class="min-h-[500px]"></div>
          </div>

          <div class="flex justify-end gap-3 pb-20">
            <button id="saveDraftBtn" class="wp-btn">存为草稿</button>
            <button id="savePublishBtn" class="bg-sky-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-sky-100 hover:bg-sky-700 transition">提交发布</button>
          </div>
        </section>

        <section id="panel-post-list" class="hidden">
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs tracking-widest">标题</th><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs tracking-widest">操作</th></tr></thead><tbody id="postsTbodyPublished" class="divide-y divide-slate-100"></tbody></table>
          </div>
        </section>

        <section id="panel-drafts" class="hidden">
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs tracking-widest">标题</th><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs tracking-widest">操作</th></tr></thead><tbody id="postsTbodyDrafts" class="divide-y divide-slate-100"></tbody></table>
          </div>
        </section>

        <section id="panel-invites" class="hidden max-w-2xl mx-auto space-y-6">
          <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <h3 class="font-bold mb-4">生成邀请码</h3>
            <div class="flex gap-2">
              <input id="inviteCount" type="number" value="1" min="1" max="10" class="w-24 border rounded-lg px-4 py-2 outline-none" />
              <button id="genInviteBtn" class="wp-btn wp-btn-primary flex-1">立即生成</button>
            </div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left"><thead class="bg-slate-50 border-b"><tr><th class="px-6 py-3">邀请码</th><th class="px-6 py-3">状态</th></tr></thead><tbody id="invitesTbody" class="divide-y divide-slate-100"></tbody></table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.min.js"></script>
  <script>
    /* --- 原有核心变量与权限校验 --- */
    const auth = JSON.parse(localStorage.getItem('hlog_auth') || 'null');
    if (!auth?.token || auth.role !== 'admin') location.href = '/login.html';
    let quill;

    async function api(path, options = {}) {
      const headers = { ...options.headers, 'Authorization': 'Bearer ' + auth.token, 'Content-Type': 'application/json' };
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    /* --- 新增：公告管理逻辑 --- */
    async function loadNotice() {
      try {
        const stats = await api('/api/stats');
        if (stats.site_notice) document.getElementById('noticeInput').value = stats.site_notice;
      } catch (e) { console.error("加载公告失败", e); }
    }

    document.getElementById('saveNoticeBtn').onclick = async () => {
      const val = document.getElementById('noticeInput').value;
      try {
        await api('/api/admin/stats/update_notice', { method: 'POST', body: JSON.stringify({ value: val }) });
        alert('公告更新成功！');
      } catch (e) { alert(e.message); }
    };

    /* --- 新增：分类管理逻辑 --- */
    async function loadCategories() {
      try {
        const { categories = [] } = await api('/api/category/list');
        const select = document.getElementById('postCategory');
        const tbody = document.getElementById('catTbody');
        
        // 更新发布页下拉框
        select.innerHTML = '<option value="">-- 请选择分类 --</option>' + 
          categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        
        // 更新分类列表表格
        tbody.innerHTML = categories.map(c => `
          <tr>
            <td class="px-6 py-4 font-bold text-slate-700">${c.name}</td>
            <td class="px-6 py-4"><button class="text-red-500 font-bold" onclick="deleteCategory(${c.id})">删除</button></td>
          </tr>`).join('');
      } catch (e) { console.error("加载分类失败", e); }
    }

    document.getElementById('addCatBtn').onclick = async () => {
      const name = document.getElementById('newCatName').value.trim();
      if(!name) return alert("请输入名称");
      try {
        await api('/api/category/add', { method: 'POST', body: JSON.stringify({ name }) });
        document.getElementById('newCatName').value = '';
        loadCategories();
      } catch (e) { alert(e.message); }
    };

    window.deleteCategory = async (id) => {
      if(!confirm("确定删除吗？")) return;
      try {
        await api('/api/category/delete', { method: 'DELETE', body: JSON.stringify({ id }) });
        loadCategories();
      } catch (e) { alert(e.message); }
    };

    /* --- 原有逻辑：编辑器、发布、列表加载 (未变动) --- */
    function initQuill() {
      quill = new Quill('#contentEditor', { theme: 'snow', modules: { toolbar: [
        [{'header': [1,2,3,false]}], ['bold','italic','underline','strike'], ['link','image','blockquote','code-block'], [{'list':'ordered'},{'list':'bullet'}], ['clean']
      ]}});
      // 图片上传拦截
      quill.getModule('toolbar').addHandler('image', () => {
        const input = document.createElement('input'); input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*');
        input.onchange = async () => {
          const file = input.files[0]; if (!file) return;
          const status = document.getElementById('editorUploadStatus'); status.classList.remove('hidden');
          try {
            const formData = new FormData(); formData.append('file', file);
            const res = await fetch('/api/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + auth.token }, body: formData });
            const data = await res.json();
            if (data.url) quill.insertEmbed(quill.getSelection()?.index || 0, 'image', data.url);
          } catch (e) { alert('上传失败'); } finally { status.classList.add('hidden'); }
        };
        input.click();
      });
    }

    async function loadDashboard() {
      try {
        const stats = await api('/api/stats');
        const site = await api('/api/site/stats');
        document.getElementById('statTodayViews').textContent = stats.today_views || 0;
        document.getElementById('statTotalPosts').textContent = site.post_count || 0;
      } catch (e) {}
    }

    async function loadPostsTable(status) {
      try {
        const data = await api(`/api/posts?status=${status}`);
        const tbody = document.getElementById(status === 'published' ? 'postsTbodyPublished' : 'postsTbodyDrafts');
        tbody.innerHTML = (data.posts || []).map(p => `
          <tr>
            <td class="px-6 py-4 font-medium text-slate-700">${p.title}</td>
            <td class="px-6 py-4 flex gap-4 text-sm">
              <button onclick="editPost(${p.id})" class="text-sky-600 font-bold">编辑</button>
              <button onclick="deletePost(${p.id})" class="text-red-500 font-bold">删除</button>
            </td>
          </tr>`).join('');
      } catch (e) {}
    }

    // 保存/发布逻辑 (在body中增加了category_id的获取)
    async function submitPost(status) {
      const title = document.getElementById('titleInput').value.trim();
      const content = quill.getSemanticHTML();
      const category_id = document.getElementById('postCategory').value; // 获取分类
      const tags = document.getElementById('tagsInput').value;
      const id = document.getElementById('postId').value;
      if (!title) return alert('标题不能为空');
      
      const btn = status === 'published' ? document.getElementById('savePublishBtn') : document.getElementById('saveDraftBtn');
      const originText = btn.textContent; btn.disabled = true; btn.textContent = '处理中...';

      try {
        await api('/api/post/create', {
          method: 'POST',
          body: JSON.stringify({ id: id ? Number(id) : null, title, content, status, tags, category_id })
        });
        alert('操作成功');
        location.hash = status === 'published' ? 'post-list' : 'drafts';
      } catch (e) { alert(e.message); } finally { btn.disabled = false; btn.textContent = originText; }
    }

    async function editPost(id) {
      try {
        const data = await api(`/api/post/view?id=${id}`);
        location.hash = 'publish';
        document.getElementById('postId').value = data.post.id;
        document.getElementById('titleInput').value = data.post.title;
        document.getElementById('tagsInput').value = data.post.tags?.join(',') || '';
        document.getElementById('postCategory').value = data.post.category_id || ''; // 填充分类
        quill.setContents(quill.clipboard.convert({html: data.post.content}));
      } catch (e) { alert('加载失败'); }
    }

    async function deletePost(id) {
      if (!confirm('确定删除？')) return;
      try {
        await api(`/api/admin/post/delete`, { method: 'POST', body: JSON.stringify({ id }) });
        location.reload();
      } catch (e) { alert('删除失败'); }
    }

    /* --- 原有：路由与初始化逻辑 (已适配新增面板) --- */
    function route() {
      const hash = location.hash.slice(1) || 'dashboard';
      const panels = ['dashboard', 'post-list', 'drafts', 'publish', 'invites', 'notice', 'categories'];
      panels.forEach(p => {
        const el = document.getElementById(`panel-${p}`);
        if (el) el.classList.toggle('hidden', p !== hash);
      });
      
      // 更新菜单激活样式
      document.querySelectorAll('aside nav a').forEach(a => a.classList.remove('menu-active'));
      const activeMenu = document.getElementById(`menu-${hash}`);
      if (activeMenu) activeMenu.classList.add('menu-active');

      // 加载对应数据
      if (hash === 'dashboard') loadDashboard();
      if (hash === 'post-list') loadPostsTable('published');
      if (hash === 'drafts') loadPostsTable('drafts');
      if (hash === 'notice') loadNotice();
      if (hash === 'categories' || hash === 'publish') loadCategories();
    }

    window.addEventListener('hashchange', route);
    window.addEventListener('load', () => { 
      initQuill(); 
      route(); 
    });
    
    document.getElementById('savePublishBtn').onclick = () => submitPost('published');
    document.getElementById('saveDraftBtn').onclick = () => submitPost('drafts');
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('hlog_auth'); location.href = '/login.html'; };
  </script>
</body>
</html>
