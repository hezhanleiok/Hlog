<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 管理面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
  <link rel="stylesheet" href="/admin-style.css" />
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <div class="px-6 py-2 text-xs font-bold text-slate-500 uppercase">核心面板</div>
        <a href="#dashboard" id="menu-dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">仪表盘概览</a>
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">创作与内容</div>
        <a href="#publish" id="menu-publish" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">撰写新文章</a>
        <a href="#post-list" id="menu-post-list" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">已发布文章</a>
        <a href="#drafts" id="menu-drafts" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">草稿箱管理</a>
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">系统与用户</div>
        <a href="#invites" id="menu-invites" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white text-amber-400">邀请码生成</a>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">用户管理</a>
        <a href="/admin-profile.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">个人中心</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 id="pageTitle" class="text-lg font-bold text-slate-700">管理面板</h2>
        <div class="flex items-center gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600 hover:text-sky-700">查看站点</a>
          <button id="logoutBtn" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">退出登录</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <section id="panel-dashboard" class="hidden space-y-6">
          <div class="flex items-center justify-between"><h3 class="text-2xl font-bold">站点概览</h3><button id="refreshStatsBtn" class="wp-btn">刷新</button></div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-sky-500">
              <div class="text-sm font-bold text-slate-400">今日阅读量</div><div id="statTodayViews" class="text-3xl font-black mt-1">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-emerald-500">
              <div class="text-sm font-bold text-slate-400">文章总数</div><div id="statTotalPosts" class="text-3xl font-black mt-1">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-amber-500">
              <div class="text-sm font-bold text-slate-400">注册用户数</div><div id="statTotalUsers" class="text-3xl font-black mt-1">0</div>
            </div>
          </div>
        </section>

        <section id="panel-post-list" class="hidden">
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-6 py-3">标题</th><th class="px-6 py-3">操作</th></tr></thead>
            <tbody id="postsTbodyPublished" class="divide-y divide-slate-100"></tbody></table>
          </div>
        </section>

        <section id="panel-drafts" class="hidden">
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <table class="w-full text-left"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-6 py-3">标题</th><th class="px-6 py-3">操作</th></tr></thead>
            <tbody id="postsTbodyDrafts" class="divide-y divide-slate-100"></tbody></table>
          </div>
        </section>

        <section id="panel-invites" class="hidden">
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 max-w-4xl">
            <button id="genInviteBtn" class="wp-btn wp-btn-primary mb-4">生成 10 个新邀请码</button>
            <div id="inviteCodesWrap" class="hidden bg-slate-50 p-4 rounded-lg"><div class="flex flex-wrap gap-2" id="inviteCodesList"></div></div>
          </div>
        </section>

        <section id="panel-publish" class="hidden max-w-5xl mx-auto space-y-4">
          <input id="postId" type="hidden" />
          <div class="bg-white rounded-xl border border-slate-200 p-4"><input id="titleInput" type="text" placeholder="文章标题..." class="w-full text-2xl font-bold outline-none" /></div>
          
          <div class="bg-white rounded-xl border border-slate-200 flex flex-col">
            <div id="editorToolbar" class="bg-slate-50 border-b p-2"></div>
            <div id="contentEditor" class="min-h-[400px]"></div>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h3 class="font-bold text-amber-600 mb-2">隐藏内容 (仅登录可见，如网盘地址)</h3>
            <textarea id="hiddenContentInput" rows="3" class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-sky-500"></textarea>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 p-4 flex justify-between sticky bottom-4">
            <span class="text-sm font-bold text-slate-500">状态管理：</span>
            <div class="flex gap-3">
              <button id="saveDraftBtn" class="wp-btn">存为草稿</button>
              <button id="savePublishBtn" class="wp-btn wp-btn-primary px-8">发布文章</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.min.js"></script>
  <script>
    const auth = JSON.parse(localStorage.getItem('hlog_auth') || 'null');
    if (!auth?.token || auth.role !== 'admin') { location.href = '/login.html'; }
    async function api(path, options = {}) {
      const headers = options.headers || {};
      headers.Authorization = 'Bearer ' + auth.token;
      headers['Content-Type'] = 'application/json';
      const res = await fetch(path, { ...options, headers });
      if (res.status === 401) { localStorage.removeItem('hlog_auth'); location.href = '/login.html'; }
      return await res.json().catch(()=>({}));
    }

    let quill = null;
    function initQuill() {
      quill = new Quill('#contentEditor', {
        theme: 'snow',
        modules: {
          toolbar: [
            [{ 'size': ['small', false, 'large', 'huge'] }], ['bold', 'italic', 'underline'],
            [{ 'color': [] }, { 'background': [] }], [{ 'align': [] }],
            [{ 'header': 1 }, { 'header': 2 }, 'blockquote', 'code-block'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['link', 'image', 'video']
          ]
        }
      });
      quill.getModule('toolbar').addHandler('image', function() {
        const input = document.createElement('input'); input.setAttribute('type', 'file'); input.click();
        input.onchange = () => {
          const file = input.files[0];
          const reader = new FileReader();
          reader.onload = e => { const range = quill.getSelection(true); quill.insertEmbed(range.index, 'image', e.target.result); quill.setSelection(range.index + 1); };
          reader.readAsDataURL(file);
        };
      });
      quill.getModule('toolbar').addHandler('video', function() {
        let url = prompt('输入视频链接 (支持 Bilibili/YouTube):');
        if (!url) return;
        let bvid = url.match(/(BV[a-zA-Z0-9]+)/); if(bvid) url = `//player.bilibili.com/player.html?bvid=${bvid[1]}&page=1&high_quality=1`;
        let yt = url.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([^"&?\/\s]{11})/); if(yt) url = `//www.youtube.com/embed/${yt[1]}`;
        const range = quill.getSelection(true); quill.insertEmbed(range.index, 'video', url); quill.setSelection(range.index + 1);
      });
    }

    async function loadDashboard() {
      const stats = await api('/api/stats');
      if (stats) {
        document.getElementById('statTodayViews').textContent = stats.today_views || 0;
        document.getElementById('statTotalPosts').textContent = stats.total_posts || 0;
        document.getElementById('statTotalUsers').textContent = stats.total_users || 0;
      }
    }

    async function loadPostsTable(status) {
      const tbody = document.getElementById(status === 'published' ? 'postsTbodyPublished' : 'postsTbodyDrafts');
      if (!tbody) return;
      const data = await api(`/api/posts?status=${status}`);
      tbody.innerHTML = (data?.posts || []).map(p => `
        <tr class="hover:bg-slate-50">
          <td class="px-6 py-4 font-bold">${p.title}</td>
          <td class="px-6 py-4">
            <button class="text-sky-600 font-bold mr-3" onclick="editPost(${p.id})">编辑</button>
            <button class="text-red-500 font-bold" onclick="deletePost(${p.id})">删除</button>
          </td>
        </tr>
      `).join('');
    }

    async function editPost(id) {
      const data = await api(`/api/post/list?id=${id}&include_drafts=1`);
      if (data?.post) {
        document.getElementById('postId').value = data.post.id;
        document.getElementById('titleInput').value = data.post.title;
        document.getElementById('hiddenContentInput').value = data.post.hidden_content || '';
        if (quill) quill.root.innerHTML = data.post.content || '';
        location.hash = 'publish';
      }
    }

    async function deletePost(id) {
      if (!confirm('确定删除吗？')) return;
      await api('/api/post/create', { method: 'DELETE', body: JSON.stringify({ id }) });
      loadPostsTable('published'); loadPostsTable('drafts');
    }

    // 修复 405 报错核心
    async function savePost(targetStatus) {
      const id = document.getElementById('postId').value;
      const title = document.getElementById('titleInput').value.trim();
      const hiddenContent = document.getElementById('hiddenContentInput').value.trim();
      const content = quill ? quill.root.innerHTML : '';
      if (!title || content === '<p><br></p>') return alert('标题和正文不能为空');

      const payload = { title, content, hidden_content: hiddenContent || null, status: targetStatus };
      let method = 'POST';
      if (id) { method = 'PUT'; payload.id = Number(id); } // 必须放入 Body

      const result = await api('/api/post/create', { method, body: JSON.stringify(payload) });
      if (result && !result.error) {
        alert(targetStatus === 'draft' ? '已存为草稿' : '发布成功');
        document.getElementById('postId').value = ''; document.getElementById('titleInput').value = '';
        document.getElementById('hiddenContentInput').value = ''; if(quill) quill.root.innerHTML = '';
        location.hash = targetStatus === 'draft' ? 'drafts' : 'post-list';
      } else alert('操作失败');
    }

    document.getElementById('genInviteBtn')?.addEventListener('click', async () => {
      const res = await api('/api/admin/invitation/generate', { method: 'POST' });
      if (res?.codes) {
        document.getElementById('inviteCodesList').innerHTML = res.codes.map(c => `<span class="bg-amber-100 font-bold px-3 py-1 rounded-full border border-amber-300">${c}</span>`).join('');
        document.getElementById('inviteCodesWrap').classList.remove('hidden');
      }
    });

    function route() {
      const hash = location.hash.slice(1) || 'dashboard';
      ['dashboard', 'post-list', 'drafts', 'publish', 'invites'].forEach(p => {
        const el = document.getElementById(`panel-${p}`); if (el) el.classList.toggle('hidden', p !== hash);
      });
      document.querySelectorAll('.admin-sidebar nav a').forEach(a => a.classList.remove('bg-[#334155]', 'text-white', 'border-l-4', 'border-sky-500'));
      const active = document.getElementById(`menu-${hash}`); if (active) active.classList.add('bg-[#334155]', 'text-white', 'border-l-4', 'border-sky-500');
      if (hash === 'dashboard') loadDashboard(); if (hash === 'post-list') loadPostsTable('published'); if (hash === 'drafts') loadPostsTable('drafts');
    }

    window.addEventListener('hashchange', route);
    window.addEventListener('load', () => { initQuill(); route(); });
    document.getElementById('refreshStatsBtn')?.addEventListener('click', loadDashboard);
    document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('hlog_auth'); location.href = '/login.html'; });
    document.getElementById('savePublishBtn')?.addEventListener('click', () => savePost('published'));
    document.getElementById('saveDraftBtn')?.addEventListener('click', () => savePost('draft'));
  </script>
</body>
</html>
