<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 管理面板</title>
  <link rel="icon" href="https://tu.xiaohelei.us.ci/1774821377748_qosfsk_ScreenShot_2026-03-30_055545_501.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">
  <link rel="stylesheet" href="/admin-style.css" />
  <style>
    .upload-loading { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 10000; font-weight: bold; color: #0284c7; backdrop-filter: blur(2px); }
    .menu-active { background-color: #334155; color: white; border-left: 4px solid #0ea5e9; }
    #editor-container { font-size: 16px; line-height: 1.6; }
    .w-e-full-screen-container { z-index: 9999; }
  </style>
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <div class="px-6 py-2 text-xs font-bold text-slate-500 uppercase tracking-widest">核心控制</div>
        <a href="#dashboard" id="menu-dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">仪表盘概览</a>
        <a href="#notice" id="menu-notice" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white text-red-400 font-bold transition">📢 站点公告管理</a>
        
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase tracking-widest">内容创作</div>
        <a href="#publish" id="menu-publish" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">撰写新文章</a>
        <a href="#post-list" id="menu-post-list" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">已发布文章</a>
        <a href="#drafts" id="menu-drafts" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">草稿箱</a>
        <a href="#categories" id="menu-categories" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">分类管理</a>
        
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase tracking-widest">系统管理</div>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">用户管理</a>
        <a href="#invites" id="menu-invites" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">邀请码管理</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 id="pageTitle" class="text-lg font-bold text-slate-700">管理后台</h2>
        <div class="flex items-center gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600 hover:text-sky-700 font-bold">预览站点</a>
          <button id="logoutBtn" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">退出登录</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <section id="panel-dashboard" class="hidden space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <div class="text-sm font-bold text-slate-400 uppercase tracking-widest">今日阅读量</div>
              <div id="statTodayViews" class="text-3xl font-black text-slate-800 mt-1">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
              <div class="text-sm font-bold text-slate-400 uppercase tracking-widest">文章总数</div>
              <div id="statTotalPosts" class="text-3xl font-black text-slate-800 mt-1">0</div>
            </div>
          </div>
        </section>

        <section id="panel-notice" class="hidden max-w-2xl mx-auto">
          <div class="bg-white p-8 rounded-2xl border shadow-sm">
            <h3 class="text-lg font-black text-red-600 mb-4 flex items-center gap-2">📢 编辑首页公告</h3>
            <textarea id="noticeInput" rows="6" placeholder="输入要发布的新公告内容..." class="w-full border border-slate-200 rounded-xl p-4 outline-none focus:border-red-500 transition-all"></textarea>
            <button id="saveNoticeBtn" class="w-full mt-6 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-700 transition">发布并更新首页公告</button>
          </div>
        </section>

        <section id="panel-categories" class="hidden max-w-3xl mx-auto">
          <div class="bg-white p-6 rounded-xl border shadow-sm mb-6">
            <h3 class="font-bold mb-4">文章分类设置</h3>
            <div class="flex gap-2">
              <input id="newCatName" class="flex-1 border rounded-lg px-4 py-2 outline-none focus:border-sky-500" placeholder="输入新分类名称..." />
              <button id="addCatBtn" class="bg-sky-600 text-white px-6 py-2 rounded-lg font-bold">新建分类</button>
            </div>
          </div>
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b"><tr><th class="px-6 py-3">分类名称</th><th class="px-6 py-3 text-right">操作</th></tr></thead>
              <tbody id="catTbody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </section>

        <section id="panel-publish" class="hidden max-w-5xl mx-auto space-y-6">
          <input id="postId" type="hidden" />
          <div class="bg-white rounded-xl border p-4 shadow-sm">
            <input id="titleInput" type="text" placeholder="文章标题..." class="w-full text-2xl font-bold outline-none" />
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm space-y-4">
            <label class="text-xs font-bold text-slate-400 block uppercase tracking-widest">文章封面图 (URL 或 上传)</label>
            <div class="flex flex-col md:flex-row gap-4">
              <input id="coverInput" type="text" placeholder="https://..." class="flex-1 border border-slate-300 rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500" />
              <button id="uploadCoverBtn" class="bg-slate-100 px-6 py-2 rounded-lg text-sm font-bold border border-slate-200 hover:bg-slate-200 transition">选择图片上传</button>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl border p-4 shadow-sm">
              <label class="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-widest">选择分类</label>
              <select id="postCategory" class="w-full border rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500">
                <option value="">-- 未分类 --</option>
              </select>
            </div>
            <div class="bg-white rounded-xl border p-4 shadow-sm">
              <label class="text-xs font-bold text-slate-400 block mb-2 uppercase tracking-widest">标签 (逗号分隔)</label>
              <input id="tagsInput" type="text" placeholder="精品,软件" class="w-full border rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500" />
            </div>
          </div>
          
          <div class="bg-white rounded-xl border flex flex-col relative shadow-sm z-10">
            <div id="editorUploadStatus" class="upload-loading hidden">文件上传中...</div>
            <div id="toolbar-container" class="border-b border-slate-200 bg-slate-50 rounded-t-xl sticky top-0 z-20"></div>
            <div id="editor-container" class="h-[650px] overflow-hidden rounded-b-xl"></div>
          </div>

          <div class="bg-white rounded-xl border p-6 shadow-sm border-amber-200 bg-amber-50/20">
            <label class="text-xs font-bold text-amber-600 block mb-2 uppercase tracking-widest">🔑 登录可见内容 (下载链接/提取码等)</label>
            <textarea id="hiddenContentInput" rows="3" class="w-full border border-amber-100 rounded-lg p-3 text-sm outline-none focus:border-amber-400 bg-white" placeholder="此处输入登录后可见的链接或密码..."></textarea>
          </div>
          <div class="flex justify-end gap-3 pb-20">
            <button id="saveDraftBtn" class="px-8 py-3 bg-slate-200 rounded-xl font-bold hover:bg-slate-300">存为草稿</button>
            <button id="savePublishBtn" class="bg-sky-600 text-white px-12 py-3 rounded-xl font-bold shadow-lg shadow-sky-100 hover:bg-sky-700 transition">发布文章</button>
          </div>
        </section>

        <section id="panel-post-list" class="hidden">
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b">
                <tr><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs">标题</th><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs">操作</th></tr>
              </thead>
              <tbody id="postsTbodyPublished" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </section>

        <section id="panel-drafts" class="hidden">
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b">
                <tr><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs">标题</th><th class="px-6 py-4 font-bold text-slate-500 uppercase text-xs">操作</th></tr>
              </thead>
              <tbody id="postsTbodyDrafts" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </section>
        
        <section id="panel-invites" class="hidden max-w-2xl mx-auto space-y-6">
          <div class="bg-white p-6 rounded-xl border shadow-sm">
            <h3 class="font-bold mb-4">生成邀请码</h3>
            <div class="flex gap-2">
              <input id="inviteCount" type="number" value="1" min="1" max="10" class="w-24 border rounded-lg px-4 py-2 outline-none" />
              <button id="genInviteBtn" class="bg-sky-600 text-white flex-1 rounded-lg font-bold">立即生成</button>
            </div>
          </div>
          <div class="bg-white rounded-xl border shadow-sm overflow-hidden">
            <table class="w-full text-left"><thead class="bg-slate-50 border-b"><tr><th class="px-6 py-3 font-bold text-slate-400">邀请码</th><th class="px-6 py-3 font-bold text-slate-400">状态</th></tr></thead><tbody id="invitesTbody" class="divide-y divide-slate-100"></tbody></table>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@wangeditor/editor@latest/dist/index.min.js"></script>
  
  <script>
    const auth = JSON.parse(localStorage.getItem('hlog_auth') || 'null');
    if (!auth?.token || auth.role !== 'admin') location.href = '/login.html';
    
    let editor = null;

    async function api(path, options = {}) {
      const headers = { ...options.headers, 'Authorization': 'Bearer ' + auth.token, 'Content-Type': 'application/json' };
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    // 初始化 WangEditor
    function initEditor() {
      if (editor) return; // 避免重复初始化
      
      // 🌟 修复点3：添加容错拦截，防止网络导致的未加载直接搞崩溃页面
      if (!window.wangEditor) {
          console.error("编辑器核心库加载失败！");
          alert("编辑器加载失败，请刷新页面重试。");
          return;
      }
      
      const { createEditor, createToolbar } = window.wangEditor;
      
      const editorConfig = {
        placeholder: '在此编写正文 (支持 Markdown 快捷键，如输入 "# " 变成标题)...',
        MENU_CONF: {
          uploadImage: {
            async customUpload(file, insertFn) {
              const status = document.getElementById('editorUploadStatus');
              status.classList.remove('hidden');
              try {
                const formData = new FormData(); 
                formData.append('file', file);
                const res = await fetch('/api/upload', { 
                    method: 'POST', 
                    headers: { 'Authorization': 'Bearer ' + auth.token }, 
                    body: formData 
                });
                const data = await res.json();
                if (data.url) {
                    insertFn(data.url, file.name, data.url);
                } else {
                    alert('图片上传失败, 请检查接口');
                }
              } catch (e) { 
                  alert('图片上传失败'); 
              } finally { 
                  status.classList.add('hidden'); 
              }
            }
          }
        }
      };

      try {
        editor = createEditor({
          selector: '#editor-container',
          html: '<p><br></p>',
          config: editorConfig,
          mode: 'default', 
        });

        createToolbar({
          editor,
          selector: '#toolbar-container',
          config: {},
          mode: 'default',
        });
      } catch (err) {
        console.error("编辑器渲染时出现错误：", err);
      }
    }

    document.getElementById('uploadCoverBtn').onclick = () => {
      const input = document.createElement('input');
      input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*');
      input.onchange = async () => {
        const file = input.files[0]; if(!file) return;
        const status = document.getElementById('editorUploadStatus');
        status.classList.remove('hidden');
        try {
          const formData = new FormData(); formData.append('file', file);
          const res = await fetch('/api/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + auth.token }, body: formData });
          const data = await res.json();
          if (data.url) { document.getElementById('coverInput').value = data.url; alert("上传成功！"); }
        } catch (e) { alert('上传失败'); } finally { status.classList.add('hidden'); }
      };
      input.click();
    };

    async function loadCategories() {
      try {
        const { categories = [] } = await api('/api/category/list');
        const select = document.getElementById('postCategory');
        const tbody = document.getElementById('catTbody');
        select.innerHTML = '<option value="">-- 未分类 --</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        if(tbody) tbody.innerHTML = categories.map(c => `<tr class="hover:bg-slate-50"><td class="px-6 py-4 font-bold text-slate-700">${c.name}</td><td class="px-6 py-4 text-right"><button class="text-red-500 font-bold" onclick="deleteCategory(${c.id})">删除</button></td></tr>`).join('');
      } catch (e) {
          console.error("加载分类失败: ", e);
      }
    }

    document.getElementById('addCatBtn').onclick = async () => {
      const nameInput = document.getElementById('newCatName');
      const name = nameInput.value.trim();
      if(!name) return alert("请输入分类名称");
      try {
        await api('/api/category/add', { method: 'POST', body: JSON.stringify({ name }) });
        nameInput.value = '';
        alert("分类创建成功");
        loadCategories();
      } catch (e) { alert(e.message); }
    };

    window.deleteCategory = async (id) => {
      if(!confirm("确定删除？")) return;
      await api('/api/category/delete', { method: 'DELETE', body: JSON.stringify({ id }) });
      loadCategories();
    };

    document.getElementById('saveNoticeBtn').onclick = async () => {
      const val = document.getElementById('noticeInput').value.trim();
      if (!val) return alert('请输入公告内容');
      const btn = document.getElementById('saveNoticeBtn');
      btn.disabled = true; btn.textContent = '发布中...';
      try {
        await api('/api/admin/announcement/add', { method: 'POST', body: JSON.stringify({ content: val }) });
        alert('公告发布成功！将会在首页展示。');
        document.getElementById('noticeInput').value = ''; 
      } catch (e) { alert('发布失败: ' + e.message); } 
      finally { btn.disabled = false; btn.textContent = '发布并更新首页公告'; }
    };

    async function submitPost(status) {
      const title = document.getElementById('titleInput').value.trim();
      if (!editor) return alert('编辑器尚未完全加载');
      const content = editor.getHtml(); 
      const cover_url = document.getElementById('coverInput').value;
      const hidden_content = document.getElementById('hiddenContentInput').value;
      const category_id = document.getElementById('postCategory').value;
      const tags = document.getElementById('tagsInput').value;
      const id = document.getElementById('postId').value;
      
      if (!title) return alert('标题不能为空');
      if (editor.getText().trim() === '') return alert('正文不能为空'); 

      const btn = status === 'published' ? document.getElementById('savePublishBtn') : document.getElementById('saveDraftBtn');
      const originText = btn.textContent; btn.disabled = true; btn.textContent = '处理中...';

      try {
        await api('/api/post/create', {
          method: id ? 'PUT' : 'POST', 
          body: JSON.stringify({ id: id ? Number(id) : null, title, content, cover_url, hidden_content, status, tags, category_id })
        });
        alert(id ? '修改保存成功！' : '文章发布成功！');
        
        resetEditor();
        location.hash = status === 'published' ? 'post-list' : 'drafts';
      } catch (e) { alert(e.message); } finally { btn.disabled = false; btn.textContent = originText; }
    }

    async function editPost(id) {
      try {
        const data = await api(`/api/post/view?id=${id}`);
        if (!data || !data.post) throw new Error(data?.error || "无法获取文章数据");
        const p = data.post;
        
        location.hash = 'publish';
        const panels = ['dashboard', 'post-list', 'drafts', 'publish', 'invites', 'notice', 'categories'];
        panels.forEach(panel => { 
            const el = document.getElementById(`panel-${panel}`); 
            if (el) el.classList.toggle('hidden', panel !== 'publish'); 
        });
        
        // 延迟一下再插入内容，避免页面闪烁
        setTimeout(() => {
            initEditor(); 
            document.getElementById('postId').value = p.id;
            document.getElementById('titleInput').value = p.title;
            document.getElementById('coverInput').value = p.cover_url || '';
            document.getElementById('hiddenContentInput').value = p.hidden_content || '';
            document.getElementById('tagsInput').value = p.tags?.join(',') || '';
            
            // 确保分类加载完成后再选中
            setTimeout(() => { document.getElementById('postCategory').value = p.category_id || ''; }, 300); 
            
            if(editor) editor.setHtml(p.content || '<p><br></p>');
            document.getElementById('savePublishBtn').textContent = '保存修改';
        }, 50);
        
      } catch (e) { alert('加载文章失败: ' + e.message); }
    }

    async function deletePost(id) {
      if(!confirm("确定彻底删除文章？操作不可逆！")) return;
      try {
        await api('/api/post/create', { method: 'DELETE', body: JSON.stringify({ id }) });
        alert('删除成功');
        loadPostsTable(location.hash === '#drafts' ? 'drafts' : 'published'); 
      } catch(e) {
        alert("删除失败: " + e.message);
      }
    }

    function resetEditor() {
      document.getElementById('postId').value = '';
      document.getElementById('titleInput').value = '';
      document.getElementById('coverInput').value = '';
      document.getElementById('hiddenContentInput').value = '';
      document.getElementById('tagsInput').value = '';
      document.getElementById('postCategory').value = '';
      
      if (editor) {
          editor.setHtml('<p><br></p>');
      }
      
      document.getElementById('savePublishBtn').textContent = '发布文章';
    }

    async function loadDashboard() {
      const s = await api('/api/stats');
      const site = await api('/api/site/stats');
      document.getElementById('statTodayViews').textContent = s.today_views || 0;
      document.getElementById('statTotalPosts').textContent = site.post_count || 0;
    }

    async function loadPostsTable(status) {
      const data = await api(`/api/posts?status=${status}`);
      const tbody = document.getElementById(status === 'published' ? 'postsTbodyPublished' : 'postsTbodyDrafts');
      tbody.innerHTML = (data.posts || []).map(p => `<tr><td class="px-6 py-4 font-bold text-slate-700">${p.title}</td><td class="px-6 py-4 flex gap-4 text-sm font-bold"><button onclick="editPost(${p.id})" class="text-sky-600">编辑</button><button onclick="deletePost(${p.id})" class="text-red-500">删除</button></td></tr>`).join('');
    }

    function route() {
      const hash = location.hash.slice(1) || 'dashboard';
      const panels = ['dashboard', 'post-list', 'drafts', 'publish', 'invites', 'notice', 'categories'];
      
      // 切换显示面板
      panels.forEach(p => { 
          const el = document.getElementById(`panel-${p}`); 
          if (el) el.classList.toggle('hidden', p !== hash); 
      });
      
      // 切换左侧高亮
      document.querySelectorAll('aside nav a').forEach(a => a.classList.remove('menu-active'));
      const activeMenu = document.getElementById(`menu-${hash}`); 
      if (activeMenu) activeMenu.classList.add('menu-active');

      // 无论切换到哪个页面，分类一定要无条件加载出来
      if (hash === 'categories' || hash === 'publish') {
          loadCategories(); 
      }

      if (hash === 'dashboard') loadDashboard();
      if (hash === 'post-list') loadPostsTable('published');
      if (hash === 'drafts') loadPostsTable('drafts');
      
      // 🌟 修复点4：必须给面板留出渲染展示时间 (setTimeout)，然后再去渲染工具栏，彻底解决工具栏变白消失！
      if (hash === 'publish') {
        setTimeout(() => {
            initEditor();
            if (!document.getElementById('postId').value) resetEditor(); 
        }, 100); 
      }
    }

    window.addEventListener('hashchange', route);
    
    // 页面初次加载
    window.addEventListener('load', () => { 
      route(); 
    });
    
    // 强制清理
    document.getElementById('menu-publish').addEventListener('click', (e) => {
      resetEditor(); 
    });

    document.getElementById('savePublishBtn').onclick = () => submitPost('published');
    document.getElementById('saveDraftBtn').onclick = () => submitPost('drafts');
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('hlog_auth'); location.href = '/login.html'; };
  </script>
</body>
</html>
