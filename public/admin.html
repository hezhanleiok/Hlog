<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 管理面板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
  <link rel="stylesheet" href="/admin-style.css" />
  <style>
    .upload-loading { position: absolute; inset: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; font-weight: bold; color: #0284c7; }
    .ql-editor { min-height: 500px; font-size: 16px; }
    /* 修复视频容器比例 */
    .ql-video { width: 100%; aspect-ratio: 16 / 9; }
  </style>
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <div class="px-6 py-2 text-xs font-bold text-slate-500 uppercase">核心面板</div>
        <a href="#dashboard" id="menu-dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">仪表盘概览</a>
        <a href="#notice" id="menu-notice" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white text-red-400 font-bold transition">📢 站点公告管理</a>
        
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">创作与内容</div>
        <a href="#publish" id="menu-publish" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">撰写新文章</a>
        <a href="#post-list" id="menu-post-list" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">已发布文章</a>
        <a href="#drafts" id="menu-drafts" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">草稿箱</a>
        <a href="#categories" id="menu-categories" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">分类管理</a>
        
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">系统管理</div>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">用户管理</a>
        <a href="#invites" id="menu-invites" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white transition">邀请码管理</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 id="pageTitle" class="text-lg font-bold text-slate-700">管理面板</h2>
        <div class="flex items-center gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600 hover:text-sky-700">查看站点</a>
          <button id="logoutBtn" class="bg-slate-100 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">退出登录</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <section id="panel-dashboard" class="hidden">...</section>

        <section id="panel-notice" class="hidden max-w-2xl mx-auto">
          <div class="bg-white p-8 rounded-2xl border shadow-sm">
            <h3 class="text-lg font-black text-red-600 mb-4 flex items-center gap-2">📢 站点公告编辑</h3>
            <textarea id="noticeInput" rows="6" class="w-full border rounded-xl p-4 outline-none focus:border-red-500"></textarea>
            <button id="saveNoticeBtn" class="w-full mt-6 bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg">更新公告</button>
          </div>
        </section>

        <section id="panel-publish" class="hidden max-w-5xl mx-auto space-y-6">
          <input id="postId" type="hidden" />
          <div class="bg-white rounded-xl border p-4 shadow-sm">
            <input id="titleInput" type="text" placeholder="文章标题..." class="w-full text-2xl font-bold outline-none" />
          </div>

          <div class="bg-white rounded-xl border p-4 shadow-sm space-y-4">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">文章封面图</label>
            <div class="flex flex-col md:flex-row gap-4">
              <input id="coverInput" type="text" placeholder="输入图片 URL 或点击右侧上传..." class="flex-1 border rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500" />
              <button id="uploadCoverBtn" class="bg-slate-100 px-6 py-2 rounded-lg text-sm font-bold hover:bg-slate-200 transition">上传图片</button>
            </div>
            <div id="coverPreviewContainer" class="hidden mt-2">
              <img id="coverPreview" src="" class="max-h-40 rounded-lg border shadow-sm" />
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl border p-4 shadow-sm">
              <label class="text-xs font-bold text-slate-400 block mb-2 uppercase">所属分类</label>
              <select id="postCategory" class="w-full border rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500">
                <option value="">-- 请选择分类 --</option>
              </select>
            </div>
            <div class="bg-white rounded-xl border p-4 shadow-sm">
              <label class="text-xs font-bold text-slate-400 block mb-2 uppercase">标签</label>
              <input id="tagsInput" type="text" placeholder="标签以逗号分隔" class="w-full border rounded-lg px-4 py-2 text-sm outline-none focus:border-sky-500" />
            </div>
          </div>

          <div class="bg-white rounded-xl border flex flex-col relative overflow-hidden shadow-sm">
            <div id="editorUploadStatus" class="upload-loading hidden">文件处理中...</div>
            <div id="contentEditor"></div>
          </div>

          <div class="bg-white rounded-xl border p-4 shadow-sm border-amber-200">
            <label class="text-xs font-bold text-amber-600 block mb-2 uppercase tracking-widest">🔑 登录可见内容 (如：下载链接、提取码)</label>
            <textarea id="hiddenContentInput" rows="3" class="w-full border-amber-100 border rounded-lg p-3 text-sm outline-none focus:border-amber-400 bg-amber-50/30" placeholder="此处内容仅登录后可见..."></textarea>
          </div>

          <div class="flex justify-end gap-3 pb-20">
            <button id="saveDraftBtn" class="px-6 py-3 bg-slate-200 rounded-xl font-bold hover:bg-slate-300">存为草稿</button>
            <button id="savePublishBtn" class="bg-sky-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg hover:bg-sky-700 transition">提交发布</button>
          </div>
        </section>

        <section id="panel-categories" class="hidden">...</section>
        <section id="panel-post-list" class="hidden">...</section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.min.js"></script>
  <script>
    const auth = JSON.parse(localStorage.getItem('hlog_auth') || 'null');
    if (!auth?.token || auth.role !== 'admin') location.href = '/login.html';
    let quill;

    async function api(path, options = {}) {
      const headers = { ...options.headers, 'Authorization': 'Bearer ' + auth.token, 'Content-Type': 'application/json' };
      const res = await fetch(path, { ...options, headers });
      return await res.json().catch(() => ({}));
    }

    // --- 恢复增强版编辑器逻辑 ---
    function initQuill() {
      // 这里的 toolbar 包含 video 和 image
      quill = new Quill('#contentEditor', { 
        theme: 'snow', 
        placeholder: '在此输入文章内容...',
        modules: { 
          toolbar: [
            [{'header': [1, 2, 3, false]}],
            ['bold', 'italic', 'underline', 'strike'],
            ['link', 'blockquote', 'code-block'],
            [{'list': 'ordered'}, {'list': 'bullet'}],
            ['image', 'video'], // 🌟 恢复视频与图片按钮
            ['clean']
          ]
        }
      });

      // 允许视频插入 URL (YouTube, Bilibili等)
      const toolbar = quill.getModule('toolbar');
      
      // 视频插入逻辑保持 Quill 默认（弹出框输入 URL）
      // 针对 Bilibili 的特别处理可以通过后期渲染或此处正则转换
      
      // 覆盖默认图片上传逻辑
      toolbar.addHandler('image', () => {
        const url = prompt("请输入图片网址 (或取消后选择本地上传)");
        if (url) {
          quill.insertEmbed(quill.getSelection()?.index || 0, 'image', url);
        } else {
          const input = document.createElement('input');
          input.setAttribute('type', 'file');
          input.setAttribute('accept', 'image/*');
          input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;
            uploadFile(file, (url) => quill.insertEmbed(quill.getSelection()?.index || 0, 'image', url));
          };
          input.click();
        }
      });
    }

    async function uploadFile(file, callback) {
      const status = document.getElementById('editorUploadStatus');
      status.classList.remove('hidden');
      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + auth.token },
          body: formData
        });
        const data = await res.json();
        if (data.url) {
          callback(data.url);
        } else {
          alert('上传失败: ' + (data.error || '未知原因'));
        }
      } catch (e) {
        alert('文件上传发生错误');
      } finally {
        status.classList.add('hidden');
      }
    }

    // --- 封面图上传 ---
    document.getElementById('uploadCoverBtn').onclick = () => {
      const input = document.createElement('input');
      input.setAttribute('type', 'file');
      input.setAttribute('accept', 'image/*');
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        uploadFile(file, (url) => {
          document.getElementById('coverInput').value = url;
          const preview = document.getElementById('coverPreview');
          preview.src = url;
          document.getElementById('coverPreviewContainer').classList.remove('hidden');
        });
      };
      input.click();
    };

    // --- 提交文章逻辑 (恢复 hidden_content 字段) ---
    async function submitPost(status) {
      const title = document.getElementById('titleInput').value.trim();
      const content = quill.getSemanticHTML();
      const cover_url = document.getElementById('coverInput').value;
      const hidden_content = document.getElementById('hiddenContentInput').value; // 🌟 恢复获取
      const category_id = document.getElementById('postCategory').value;
      const tags = document.getElementById('tagsInput').value;
      const id = document.getElementById('postId').value;
      
      if (!title) return alert('标题不能为空');
      
      const btn = status === 'published' ? document.getElementById('savePublishBtn') : document.getElementById('saveDraftBtn');
      const originText = btn.textContent; btn.disabled = true; btn.textContent = '处理中...';

      try {
        await api('/api/post/create', {
          method: 'POST',
          body: JSON.stringify({ 
            id: id ? Number(id) : null, 
            title, 
            content, 
            cover_url,
            hidden_content, // 🌟 恢复保存
            status, 
            tags, 
            category_id 
          })
        });
        alert('操作成功');
        location.hash = status === 'published' ? 'post-list' : 'drafts';
      } catch (e) {
        alert(e.message);
      } finally {
        btn.disabled = false; btn.textContent = originText;
      }
    }

    // 编辑回显逻辑同理增加 cover_url 和 hidden_content 的填充即可
    // (此处代码略，逻辑与 titleInput.value = data.post.title 一致)

    // ... 其他公告、分类加载、路由逻辑保持之前不变 ...
    
    window.onload = () => { initQuill(); route(); };
  </script>
</body>
</html>
