<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLOG - 评论审核</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/admin-style.css" />
</head>
<body class="bg-[#f0f2f5] text-slate-800 font-sans antialiased">
  <div class="admin-layout flex min-h-screen">
    <aside class="w-64 bg-[#1e293b] text-slate-300 flex-shrink-0 shadow-xl z-20">
      <div class="h-16 flex items-center px-6 bg-[#0f172a] text-xl font-black text-white tracking-widest">HLOG Admin</div>
      <nav class="mt-4 py-2 space-y-1">
        <a href="/admin.html#dashboard" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">回到主面板</a>
        <div class="px-6 py-2 mt-4 text-xs font-bold text-slate-500 uppercase">系统与用户</div>
        <a href="/admin-comments.html" class="flex items-center px-6 py-3 bg-[#334155] text-white border-l-4 border-sky-500">评论审核</a>
        <a href="/admin-users.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">用户管理</a>
        <a href="/admin-profile.html" class="flex items-center px-6 py-3 hover:bg-[#334155] hover:text-white">个人中心</a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
        <h2 class="text-lg font-bold text-slate-700">待审核评论</h2>
        <div class="flex gap-4">
          <a href="/" target="_blank" class="text-sm font-medium text-sky-600">查看前台</a>
          <button id="logoutBtn" class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold">退出</button>
        </div>
      </header>

      <main class="flex-1 overflow-auto p-8 relative">
        <div class="max-w-4xl space-y-4" id="list"></div>
      </main>
    </div>
  </div>

  <script>
    const auth = JSON.parse(localStorage.getItem("hlog_auth") || "null");
    if (!auth?.token || auth.role !== "admin") location.href = "/login.html";
    async function api(path, options = {}) {
      options.headers = { Authorization: `Bearer ${auth.token}`, "Content-Type": "application/json" };
      return await (await fetch(path, options)).json().catch(() => ({}));
    }
    document.getElementById("logoutBtn").addEventListener("click", () => { localStorage.removeItem("hlog_auth"); location.href = "/login.html"; });

    async function loadPending() {
      const { comments } = await api("/api/admin/comment/pending");
      const list = document.getElementById("list");
      list.innerHTML = (comments && comments.length) ? comments.map(c => `
        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
          <div class="font-bold mb-2">${c.author_name} (${c.author_email}) - 《${c.post_title}》</div>
          <div class="bg-slate-50 p-3 rounded mb-4">${c.content}</div>
          <div class="flex gap-2">
            <button data-approve="${c.id}" class="wp-btn wp-btn-primary">批准</button>
            <button data-delete="${c.id}" class="wp-btn text-red-600 border-red-200">删除</button>
          </div>
        </div>
      `).join("") : '<div class="text-slate-500 bg-white p-8 rounded-xl text-center">暂无待审评论</div>';

      list.querySelectorAll("[data-approve]").forEach(b => b.addEventListener("click", async () => {
        await api("/api/admin/comment/approve", { method: "POST", body: JSON.stringify({ id: Number(b.dataset.approve) }) }); loadPending();
      }));
      list.querySelectorAll("[data-delete]").forEach(b => b.addEventListener("click", async () => {
        if(confirm("删除？")) { await api("/api/admin/comment/delete", { method: "POST", body: JSON.stringify({ id: Number(b.dataset.delete) }) }); loadPending(); }
      }));
    }
    loadPending();
  </script>
</body>
</html>
